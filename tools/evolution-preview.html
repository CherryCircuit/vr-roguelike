function makeTextSprite(text, opts = {}) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = opts.fontSize || 64;
  const font = `bold ${fontSize}px ${opts.forceArial ? 'Arial, sans-serif' : fontFamily}`;
  const maxWidth = opts.maxWidth || null;
  ctx.font = font;
  let lines = [text];
  if (maxWidth) {
    lines = []; const words = text.split(' '); let cur = '';
    for (const w of words) { const t = cur ? `${cur} ${w}` : w; if (ctx.measureText(t).width > maxWidth && cur) { lines.push(cur); cur = w; } else cur = t; }
    if (cur) lines.push(cur);
  }
  const tw = maxWidth || Math.ceil(Math.max(...lines.map(l => ctx.measureText(l).width)));
  const lh = fontSize * 1.3, th = lines.length * lh, pad = opts.glow ? 25 : 40;
  canvas.width = tw + pad*2; canvas.height = th + pad*2;
  ctx.font = font; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (opts.glow) { ctx.shadowColor = opts.glowColor || opts.color || '#00ffff'; ctx.shadowBlur = 15; }
  if (opts.shadow) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    lines.forEach((l, i) => { ctx.fillText(l, canvas.width/2+2, canvas.height/2 - ((lines.length-1)*lh/2) + i*lh + 2); });
  }
  ctx.fillStyle = opts.color || '#00ffff';
  lines.forEach((l, i) => { ctx.fillText(l, canvas.width/2, canvas.height/2 - ((lines.length-1)*lh/2) + i*lh); });
  const tex = new THREE.CanvasTexture(canvas); tex.minFilter = THREE.LinearFilter;
  const s = opts.scale || 0.3;
  let w, h;
  if (maxWidth) {
    // Match game's makeSprite: scale = desired width, size in world units via pixels
    const unitPerPixel = s / maxWidth;
    w = canvas.width * unitPerPixel;
    h = canvas.height * unitPerPixel;
  } else {
    const aspect = canvas.width / canvas.height;
    w = aspect * s;
    h = s;
  }
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: opts.depthTest !== undefined ? opts.depthTest : false, depthWrite: false, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = opts.renderOrder !== undefined ? opts.renderOrder : 999;
  return mesh;
}

function getGlowTex(r, g, b) {
  const c = document.createElement('canvas'); c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(64,64,0,64,64,64);
  grad.addColorStop(0, `rgba(${r},${g},${b},0.5)`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},0.2)`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
  const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
  return tex;
}

function makeUpgradeCard(upgrade, pos) {
  const group = new THREE.Group();
  group.position.copy(pos);
  group.userData.upgradeId = upgrade.id;
  const bc = typeof upgrade.color === 'string' ? parseInt(upgrade.color.replace('#',''),16) : (upgrade.color||0x00ffff);
  const card = new THREE.Mesh(cardGeo, new THREE.MeshBasicMaterial({ color:0x110033, transparent:true, opacity:0.91, side:THREE.DoubleSide, depthWrite:false }));
  card.renderOrder = 1; card.userData.isUpgradeCard = true; card.userData.upgradeId = upgrade.id; card.userData.borderColor = bc;
  group.add(card);
  group.add(new THREE.LineSegments(cardBorderGeo, new THREE.LineBasicMaterial({ color: bc })));
  const br=(bc>>16)&255, bg=(bc>>8)&255, bb=bc&255;
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(1.56,1.95), new THREE.MeshBasicMaterial({ map:getGlowTex(br,bg,bb), transparent:true, opacity:0, depthTest:false, depthWrite:false }));
  glow.renderOrder = 998; glow.position.z = -0.01; card.add(glow); card.userData._hoverGlow = glow;
  const name = makeTextSprite(upgrade.name.toUpperCase(), { fontSize:65, color:upgrade.color||'#00ffff', glow:true, glowColor:upgrade.color, scale:1, maxWidth:600 });
  name.position.set(0, 0.54, 0.01); group.add(name);
  const desc = makeTextSprite(upgrade.desc, { fontSize:40, color:'#cccccc', scale:1, maxWidth:600, forceArial:true });
  desc.position.set(0, 0.16, 0.01); group.add(desc);
  const stat = makeTextSprite(upgrade.stat||'', { fontSize:34, color:'#88ff88', scale:1, maxWidth:600, forceArial:true });
  stat.position.set(0, -0.18, 0.01); group.add(stat);
  const note = makeTextSprite(upgrade.note||'', { fontSize:25, color:'#ffdd00', scale:1, maxWidth:600, forceArial:true });
  note.position.set(0, -0.36, 0.01); group.add(note);
  const icon = new THREE.Mesh(iconGeo, new THREE.MeshBasicMaterial({ color:bc, wireframe:true }));
  icon.position.set(0, -0.52, 0.05); group.add(icon);
  if (upgrade._isRecipePiece) {
    const badge = makeTextSprite('⚡ EVO', { fontSize:36, color:'#ffcc00', glow:true, glowColor:'#ffcc00', scale:0.3, maxWidth:200 });
    badge.position.set(0.35, 0.65, 0.02); group.add(badge);
  }
  return group;
}

function makeEvoCard(evo) {
  const group = new THREE.Group();

  const card = new THREE.Mesh(new THREE.PlaneGeometry(1.2,1.5), new THREE.MeshBasicMaterial({ color:0x110033, transparent:true, opacity:0.95, side:THREE.DoubleSide, depthWrite:false }));

  group.add(card);
  // Double border for evo card
  group.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(1.2,1.5)), new THREE.LineBasicMaterial({ color:evo.sigColor })));
  const inner = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(1.05,1.35)), new THREE.LineBasicMaterial({ color:evo.sigColorAlt }));
  inner.position.z = 0.001; group.add(inner);
  // Glow
  const r=(evo.sigColor>>16)&255, g=(evo.sigColor>>8)&255, b=evo.sigColor&255;
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(1.56,1.95), new THREE.MeshBasicMaterial({ map:getGlowTex(r,g,b), transparent:true, opacity:0.3, depthTest:false, depthWrite:false }));
  glow.renderOrder = 998; glow.position.z = -0.01; card.add(glow); card.userData._hoverGlow = glow;
  // Same text layout as upgrade cards
  const label = makeTextSprite('⚡ EVOLUTION', { fontSize:34, color:sigHex, glow:true, glowColor:sigHex, scale:0.5, maxWidth:400 });
  label.position.set(0, 0.72, 0.01); group.add(label);
  const name = makeTextSprite(evo.name.toUpperCase(), { fontSize:65, color:'#ffffff', glow:true, glowColor:sigHex, scale:1, maxWidth:600 });
  name.position.set(0, 0.54, 0.01); group.add(name);
  const desc = makeTextSprite(evo.desc, { fontSize:38, color:'#dddddd', scale:0.9, maxWidth:550, forceArial:true });
  desc.position.set(0, 0.16, 0.01); group.add(desc);
  const from = makeTextSprite(`${evo.from} → ${evo.name}`, { fontSize:30, color:'#888888', scale:0.65, maxWidth:500, forceArial:true });
  from.position.set(0, -0.15, 0.01); group.add(from);
  const icon = new THREE.Mesh(iconGeo, new THREE.MeshBasicMaterial({ color:evo.sigColor, wireframe:true }));
  icon.position.set(0, -0.52, 0.05); group.add(icon);
  return group;
}

function make3DButton(text, color, x, onClick) {
  const group = new THREE.Group();
  group.position.set(x, 0, 0);
  group.userData.isButton = true;
  group.userData.onClick = onClick;
  const bg = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.35), new THREE.MeshBasicMaterial({ color:0x0a0020, transparent:true, opacity:0.8, side:THREE.DoubleSide, depthWrite:false }));
  bg.userData.isButton = true; bg.userData.onClick = onClick; bg.userData.borderColor = color;
  group.add(bg);
  group.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(0.8,0.35)), new THREE.LineBasicMaterial({ color })));
  const label = makeTextSprite(text, { fontSize:40, color:'#'+color.toString(16).padStart(6,'0'), scale:0.25, maxWidth:300, forceArial:true });
  label.position.z = 0.01; group.add(label);
  // Hover glow
  const r=(color>>16)&255, g=(color>>8)&255, b=color&255;
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(1.0,0.45), new THREE.MeshBasicMaterial({ map:getGlowTex(r,g,b), transparent:true, opacity:0, depthTest:false, depthWrite:false }));
  glow.position.z = -0.01; bg.add(glow); bg.userData._hoverGlow = glow;
  return group;
}

let selectedWeapon = 'plasma_carbine';

function cycleWeapon(dir) {
  ensureAudio();
  weaponIdx = (weaponIdx + dir + WEAPON_ORDER.length) % WEAPON_ORDER.length;
  selectedWeapon = WEAPON_ORDER[weaponIdx];
  updateWeaponLabel();
  if (phase === 'idle') reset();
}

function updateWeaponLabel() {
  const evo = getEvo();
  // Dispose old texture if present
  if (weaponLabel.children[0] && weaponLabel.children[0].material && weaponLabel.children[0].material.map) {
    weaponLabel.children[0].material.map.dispose();
  }
  while(weaponLabel.children.length) weaponLabel.remove(weaponLabel.children[0]);
  const s = makeTextSprite(evo.from + ' → ' + evo.name, { fontSize:40, color:'#aaaaaa', scale:0.25, maxWidth:500, forceArial:true });
  s.position.z = 0.01; weaponLabel.add(s);
}

const resetBtn3D = make3DButton('RESET', 0xff4444, 0.8, () => { ensureAudio(); reset(); setStatus('Ready.'); });

vrBtnGroup.add(prevBtn, weaponLabel, nextBtn, showBtn, resetBtn3D);
updateWeaponLabel();

// Position VR buttons: fixed in world, above where cards will appear
function positionVRButtons() {
  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  const camDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const center = camPos.clone().add(camDir.multiplyScalar(4));
  center.y = camPos.y + 1.4; // above cards
  vrBtnGroup.position.copy(center);
  // Face camera (Y only)
  const dx = camPos.x - center.x, dz = camPos.z - center.z;
  vrBtnGroup.rotation.y = Math.atan2(dx, dz);
}
positionVRButtons();

  ctrl.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color:c, transparent:true, opacity:0.25, depthTest:false, depthWrite:false })));
});
controllerL?.addEventListener('selectstart', () => onVRSelect(controllerL));
controllerR?.addEventListener('selectstart', () => onVRSelect(controllerR));

// ══════════════════════════════════════════════════════════════
// PARTICLES (world-space)
// ══════════════════════════════════════════════════════════════
const particles = [];
const pGeo = new THREE.SphereGeometry(0.012, 6, 6);

function spawnP(pos, color, vel, life=1) {
  const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:1, depthWrite:false });
  const m = new THREE.Mesh(pGeo, mat); m.position.copy(pos); scene.add(m);
  particles.push({ m, v:vel.clone(), life, ml:life, mat });
}
function updateParticles(dt) {
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i]; p.life -= dt;
    if (p.life <= 0) { scene.remove(p.m); p.mat.dispose(); particles.splice(i,1); continue; }
    p.m.position.addScaledVector(p.v, dt);
    p.mat.opacity = p.life / p.ml;
    p.m.scale.setScalar(p.life / p.ml);
  }
}
function clearParticles() { particles.forEach(p => { scene.remove(p.m); p.mat.dispose(); }); particles.length = 0; }

function burst(pos, color, n=30, spd=2) {
  for (let i=0; i<n; i++) {
    const d = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
    spawnP(pos, color, d.multiplyScalar(spd*(0.5+Math.random())), 0.5+Math.random()*0.5);
  }
}
function ring(pos, color, n=24, r=0.5) {
  for (let i=0; i<n; i++) {
    const a = (i/n)*Math.PI*2;
    const pp = pos.clone().add(new THREE.Vector3(Math.cos(a)*r, 0, Math.sin(a)*r));
    const v = new THREE.Vector3(Math.cos(a)*1.5, 0.3+Math.random()*0.5, Math.sin(a)*1.5);
    spawnP(pp, color, v, 0.6+Math.random()*0.4);
  }
}
function sparkleRing(pos, color, n=16, r=0.3) {
  for (let i=0; i<n; i++) {
    const a = Math.random()*Math.PI*2;
    const pp = pos.clone().add(new THREE.Vector3((Math.random()-0.5)*r*2, (Math.random()-0.5)*r, (Math.random()-0.5)*r*2));
    spawnP(pp, color, new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*0.8, (Math.random()-0.5)*0.5), 0.3+Math.random()*0.3);
  }
}

// AUDIO

let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (AudioContext||webkitAudioContext)(); return audioCtx; }
function ensureAudio() { getAudio(); if (audioCtx.state==='suspended') audioCtx.resume(); }
function tone(f,d,t='sine',v=0.1,det=0) {
  const c=getAudio(),o=c.createOscillator(),g=c.createGain();
  o.type=t;o.frequency.value=f;o.detune.value=det;
  g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);
}
function noise(d,v=0.1) {
  const c=getAudio(),sz=c.sampleRate*d,b=c.createBuffer(1,sz,c.sampleRate),dd=b.getChannelData(0);
  for(let i=0;i<sz;i++)dd[i]=Math.random()*2-1;
  const s=c.createBufferSource();s.buffer=b;const g=c.createGain();
  g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
  s.connect(g);g.connect(c.destination);s.start();
}
function chord(b,d=1){tone(b,d,'sine',0.08);tone(b*1.25,d,'sine',0.06);tone(b*1.5,d,'sine',0.04);tone(b*2,d,'triangle',0.03);}

const SFX = {
  cardSelect: ()=>{tone(880,0.08,'square',0.08);tone(1200,0.06,'sine',0.04);},
  cardDismiss: ()=>tone(220,0.3,'sine',0.04),
  zoomIn: ()=>{tone(440,0.4,'sine',0.06);tone(660,0.3,'sine',0.04,5);},
  rotHum: (t)=>tone(100+t*400,0.12,'sawtooth',0.012+t*0.025),
  flash: ()=>{noise(0.4,0.18);tone(1000,0.3,'square',0.12);chord(440,0.8);},
  evoReveal: ()=>{tone(660,0.5,'sine',0.08);tone(880,0.4,'sine',0.06);chord(523,1);},
  detach: ()=>{tone(220,0.3,'triangle',0.08);tone(330,0.2,'sine',0.04);},
  rainbowPeak: (f)=>tone(f,0.18,'sawtooth',0.06),
  transformBurst: ()=>{noise(0.5,0.22);chord(523,1.5);tone(80,0.4,'sine',0.12);},
  returnHand: ()=>tone(440,0.4,'sine',0.06),

const CARD_XS = [-2.02, -0.68, 0.68, 2.1];
const SCENE_Y_OFFSET = -0.725;

// Groups
const cardGroup = new THREE.Group(); cardGroup.name = 'upgrade-cards'; scene.add(cardGroup); cardGroup.visible = false;
const fusionGroup = new THREE.Group(); fusionGroup.name = 'fusion'; scene.add(fusionGroup); fusionGroup.visible = false;

// Flash via setClearColor (works in VR)

let phase = 'idle';
let phaseTime = 0;
let currentCards = [];
let hoveredObj = null;
let lastHumTime = 0;
let selectedRecipeIdx = -1;
let fusionCards = [];

function getEvo() { return EVOLUTIONS[selectedWeapon]; }
function setStatus(t) { document.getElementById('status').textContent = t; }

function clearGrp(g) { g.children.forEach(c => { c.traverse(m => { if(m.material?.map) m.material.map.dispose(); if(m.material) m.material.dispose(); }); }); g.clear(); }

function addHud(text, color='#ffffff') {

// ══════════════════════════════════════════════════════════════
// EASING
// ══════════════════════════════════════════════════════════════
const easeOutCubic = t => 1-Math.pow(1-t,3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
const easeOutBack = t => { const c=2.70158; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2); };
const easeInBack = t => { const c=2.70158; return (c+1)*t*t*t-c*t*t; };

// ══════════════════════════════════════════════════════════════
// SHOW CARDS (position fixed in world, NOT following camera)
// ══════════════════════════════════════════════════════════════
function showCards() {
  reset();
  const evo = getEvo();
  selectedRecipeIdx = Math.floor(Math.random()*3);

  clearGrp(cardGroup);
  // Position card group FIXED in world — at camera's current position + 4m forward
  const camPos = new THREE.Vector3(); camera.getWorldPosition(camPos);
  const camDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const center = camPos.clone().add(camDir.multiplyScalar(4));
  center.y = camPos.y + SCENE_Y_OFFSET + 0.9;
  cardGroup.position.copy(center);

  // Also position VR buttons above cards (fixed)
  vrBtnGroup.position.set(center.x, center.y + 1.5, center.z);
  const dx = camPos.x - vrBtnGroup.position.x, dz = camPos.z - vrBtnGroup.position.z;
  vrBtnGroup.rotation.y = Math.atan2(dx, dz);

  // Build recipe cards
  const recipeIds = evo.recipe;
  recipeIds.forEach((id, i) => {
    const u = { ...UPGRADES[id] }; u._isRecipePiece = true;
    const card = makeUpgradeCard(u, new THREE.Vector3(CARD_XS[i], 0, 0));
    card.userData.isFinalRecipe = (i === selectedRecipeIdx);
    cardGroup.add(card);
    currentCards.push(card);
  });
  // SKIP
  const skip = makeSkipCard(new THREE.Vector3(CARD_XS[3], 0, 0));
  cardGroup.add(skip);
  currentCards.push(skip);

  // Warp-in (matching game)
  currentCards.forEach((card, i) => {
    card.userData._warpBase = card.position.clone();
    card.userData._warpActive = true;
    card.userData._warpStart = performance.now() + i * 110;
    card.userData._hoverScale = 1;
    card.position.y -= 0.18;
    card.rotation.x = -0.16;
    card.scale.setScalar(0.7);
  });

  cardGroup.visible = true;
  phase = 'cards';
  weaponAttached = true;
  evolved = false;
  coreMat.color.setHex(evo.baseColor);
  glowSMat.color.setHex(evo.baseColor);
  glowSMat.opacity = 0.2;
  auraOrbs.forEach(o => o.material.opacity = 0);
  weaponGroup.scale.setScalar(1);

  setStatus('Select the ⚡ EVO card to trigger evolution');
}

// ══════════════════════════════════════════════════════════════
// CARD WARP-IN
// ══════════════════════════════════════════════════════════════
function updateWarp() {
  const now = performance.now(), dur = 420;
  currentCards.forEach(card => {
    if (!card.userData._warpActive) return;
    const el = now - card.userData._warpStart;
    if (el < 0) return;
    const t = Math.min(el/dur, 1);
    if (t >= 1) {
      card.position.copy(card.userData._warpBase); card.rotation.x = 0;
      card.scale.setScalar(card.userData._hoverScale); card.userData._warpActive = false; return;
    }
    const s = 0.7 + 0.3 * easeOutBack(t);
    const yOff = (1-easeOutCubic(t)) * 0.18;
    const tilt = (1-easeOutCubic(t)) * 0.16;
    card.position.set(card.userData._warpBase.x, card.userData._warpBase.y - yOff, card.userData._warpBase.z);
    card.rotation.x = -tilt;
    card.scale.setScalar(s * (card.userData._hoverScale||1));
  });
}

// ══════════════════════════════════════════════════════════════
// HOVER (works in VR via controller raycasting)
// ══════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();

function getHoverTargets() {
  const targets = [];
  if (phase === 'cards' && cardGroup.visible) {
    cardGroup.children.forEach(c => { c.traverse(m => { if(m.userData?.isUpgradeCard) targets.push(m); }); });
  }
  if (phase === 'evo_card' && evoCardGroup.visible) {
    evoCardGroup.children.forEach(c => { c.traverse(m => { if(m.userData?.isUpgradeCard) targets.push(m); }); });
  }
  // VR buttons always hoverable
  vrBtnGroup.traverse(m => { if(m.userData?.isButton) targets.push(m); });
  return targets;
}

function findCardGroupFromFace(face) {
  let cur = face;
  while (cur) {
    if (cur.userData?.upgradeId !== undefined && !cur.userData?.isUpgradeCard) return cur;
    if (cur.parent === cardGroup || cur.parent === evoCardGroup) return cur;
    cur = cur.parent;
  }
  return null;
}

let prevHovered = null;
function updateHover() {
  const targets = getHoverTargets();
  if (!targets.length) { hoveredObj = null; return; }

  // Raycaster from VR controller or mouse
  if (renderer.xr.isPresenting && controllerR) {
    const mat4 = new THREE.Matrix4().identity().extractRotation(controllerR.matrixWorld);
    raycaster.ray.origin.setFromMatrixPosition(controllerR.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(mat4);
  }
  // For desktop, raycaster is set by mousemove event

  const hits = raycaster.intersectObjects(targets, false);
  const hit = hits.length > 0 ? hits[0].object : null;

  // Determine what we're hovering over
  let newHovered = null;
  if (hit?.userData?.isUpgradeCard) {
    // Find the parent card group
    newHovered = findCardGroupFromFace(hit) || hit;
  } else if (hit?.userData?.isButton) {
    newHovered = hit;
  }

  if (newHovered !== prevHovered) {
    if (newHovered) SFX.hover();
    prevHovered = newHovered;
  }
  hoveredObj = newHovered;
}

function applyHoverEffects() {
  // Card hover
  currentCards.forEach(card => {
    const face = card.children.find(c => c.userData?.isUpgradeCard);
    if (!face) return;
    const isHov = (face === hoveredObj || card === hoveredObj);
    const target = isHov ? 1.08 : 1;
    card.userData._hoverScale = THREE.MathUtils.lerp(card.userData._hoverScale||1, target, 0.15);
    if (face.userData._hoverGlow) face.userData._hoverGlow.material.opacity = THREE.MathUtils.lerp(face.userData._hoverGlow.material.opacity, isHov?0.65:0, isHov?0.15:0.12);
    if (!card.userData._warpActive) card.scale.setScalar(card.userData._hoverScale);
  });

  // Evo card hover
  if (phase === 'evo_card' && evoCardGroup.children[0]) {
    const ec = evoCardGroup.children[0];
    const face = ec.children.find(c => c.userData?.isUpgradeCard);
    if (face) {
      const isHov = (face === hoveredObj || ec === hoveredObj);
      const ts = isHov ? 1.08 : 1;
      ec.scale.lerp(new THREE.Vector3(ts,ts,ts), 0.15);
      if (face.userData._hoverGlow) face.userData._hoverGlow.material.opacity = THREE.MathUtils.lerp(face.userData._hoverGlow.material.opacity, isHov?0.65:0.3, 0.15);
    }
  }

  // VR button hover
  vrBtnGroup.children.forEach(btnGrp => {
    btnGrp.traverse(m => {
      if (m.userData?.isButton && m.userData._hoverGlow) {
        const isHov = (m === hoveredObj);
        m.userData._hoverGlow.material.opacity = THREE.MathUtils.lerp(m.userData._hoverGlow.material.opacity||0, isHov?0.5:0, 0.15);
        const s = isHov ? 1.05 : 1;
        m.parent.scale.lerp(new THREE.Vector3(s,s,s), 0.15);
      }
    });
  });
}

// ══════════════════════════════════════════════════════════════
// CARD SELECTION
// ══════════════════════════════════════════════════════════════
function onCardSelected(card) {
  if (phase !== 'cards') return;
  ensureAudio();
  if (card.userData.upgradeId === 'SKIP') {
    SFX.cardDismiss(); setStatus('Skipped!'); currentCards.forEach(c => c.visible = false);
    setTimeout(() => showCards(), 1200); return;
  }
  if (!card.userData.isFinalRecipe) {
    SFX.cardSelect(); setStatus('Recipe piece collected — but not the final one!');
    currentCards.forEach(c => c.visible = false);
    setTimeout(() => showCards(), 1500); return;
  }
  SFX.cardSelect();
  startFusion(card);
}

// ══════════════════════════════════════════════════════════════
// PHASE 1: FUSION
// ══════════════════════════════════════════════════════════════
async function startFusion(selCard) {
  phase = 'fusion'; phaseTime = 0; clearParticles(); clearHud();
  const evo = getEvo();

  // Get world position of selected card
  const wp = new THREE.Vector3(); selCard.getWorldPosition(wp);
  fusionCenter.copy(wp);

  // Hide non-selected, non-recipe cards
  currentCards.forEach(c => {
    if (c === selCard) return;
    if (c.userData.upgradeId === 'SKIP' || !c.userData.isFinalRecipe) {
      animScale(c, 0.01, 0.4, easeInBack);
    }
  });
  cardGroup.visible = false;

  await wait(0.4);
  setStatus('Recipe cards arriving...');

  // Build 3 recipe cards in fusion group
  clearGrp(fusionGroup);
  fusionGroup.visible = true;
  fusionCards = [];
  const recipeData = evo.recipe.map(id => { const u = {...UPGRADES[id]}; u._isRecipePiece = true; return u; });
  const otherIdxs = [0,1,2].filter(i => i !== selectedRecipeIdx);

  // Selected card at center
  const sc = makeUpgradeCard(recipeData[selectedRecipeIdx], wp.clone());
  fusionGroup.add(sc); fusionCards.push(sc);

  // Other 2 from off-screen
  const starts = [
    wp.clone().add(new THREE.Vector3(-5, 1.5, 0)),
    wp.clone().add(new THREE.Vector3(5, -1, 0)),
  ];
  for (let j = 0; j < 2; j++) {
    const c = makeUpgradeCard(recipeData[otherIdxs[j]], starts[j].clone());
    c.scale.setScalar(0.01);
    // Face camera Y-only
    billboardY(c);
    fusionGroup.add(c); fusionCards.push(c);
  }
  SFX.zoomIn();
  await Promise.all([
    animPos(fusionCards[1], starts[0], wp, 0.6, easeOutBack),
    animScale(fusionCards[1], 1, 0.5, easeOutBack),
    animPos(fusionCards[2], starts[1], wp, 0.6, easeOutBack),
    animScale(fusionCards[2], 1, 0.5, easeOutBack),
  ]);
  await wait(0.2);
  setStatus('Triangle rotation accelerating...');
}

function updateFusion(dt) {
  phaseTime += dt;
  const evo = getEvo();
  const rotStart = 0, rotEnd = 3.5, flashT = 3.5, evoStart = 4.0, evoEnd = 4.8;

  if (phaseTime >= rotStart && phaseTime <= rotEnd) {
    const t = (phaseTime - rotStart) / (rotEnd - rotStart);
    const speed = 0.5 + t * t * 8;
    const radius = 1.5 * (1 - t * 0.92);
    const base = phaseTime * speed;

    fusionCards.forEach((card, i) => {
      const angle = base + (i/3) * Math.PI * 2;
      // ORBIT IN HORIZONTAL PLANE (same Y!) — XZ only
      card.position.x = fusionCenter.x + Math.cos(angle) * radius;
      card.position.z = fusionCenter.z + Math.sin(angle) * radius;
      card.position.y = fusionCenter.y; // SAME HEIGHT
      // Billboard Y only
      billboardY(card);
      // Rainbow borders
      const hue = (phaseTime * 0.5 + i * 0.33) % 1;
      const rc = new THREE.Color().setHSL(hue, 1, 0.5);
      card.traverse(c => {
        if (c.isLineSegments) c.material.color.copy(rc);
        if (c.userData?._hoverGlow) { c.userData._hoverGlow.material.opacity = t*0.5; c.userData._hoverGlow.material.color.copy(rc); }
      });
      card.scale.setScalar(1 + Math.sin(phaseTime*3+i)*0.02*t);
    });

    // Sparkle particles
    if (Math.random() < t * 0.5) {
      const a = Math.random()*Math.PI*2, r = radius*(0.5+Math.random());
      sparkleRing(fusionCenter.clone().add(new THREE.Vector3(Math.cos(a)*r, 0, Math.sin(a)*r)),
        new THREE.Color().setHSL((phaseTime*0.8)%1, 1, 0.7).getHex(), 2, 0.1);
    }

    // Hum
    if (phaseTime - lastHumTime > Math.max(0.06, 0.25 - t*0.2)) { SFX.rotHum(t); lastHumTime = phaseTime; }
    setStatus(`Fusion ${(t*100).toFixed(0)}%`);
  }

  // Flash
  if (phaseTime >= flashT && phaseTime < flashT + 0.05) {
    SFX.flash();
    burst(fusionCenter, 0xffffff, 50, 3);
    burst(fusionCenter, evo.sigColor, 30, 2.5);
    ring(fusionCenter, evo.sigColor, 24, 0.5);
    triggerFlash();
    fusionCards.forEach(c => c.visible = false);
  }

  // Evo card
  if (phaseTime >= evoStart && phase === 'fusion') {
    const at = Math.min((phaseTime - evoStart) / (evoEnd - evoStart), 1);
    if (!evoCardGroup.visible) {
      clearGrp(evoCardGroup);
      const ec = makeEvoCard(evo);
      ec.position.copy(fusionCenter); ec.position.z -= 0.2;
      ec.scale.setScalar(0.01);
      billboardY(ec);
      evoCardGroup.add(ec); evoCardGroup.visible = true;
      fusionGroup.visible = false; clearParticles();
      SFX.evoReveal();
      setStatus('⚡ Hover and click/trigger the evolution card!');
    }
    const card = evoCardGroup.children[0];
    if (card) { card.scale.setScalar(easeOutBack(at)); billboardY(card); }
    if (at >= 1) { phase = 'evo_card'; phaseTime = 0; }
  }
}

// Billboard on Y axis only (card faces camera, stays level)
function billboardY(obj) {
  const cp = new THREE.Vector3(); camera.getWorldPosition(cp);
  const wp = new THREE.Vector3(); obj.getWorldPosition(wp);
  const dx = cp.x - wp.x, dz = cp.z - wp.z;
  obj.rotation.y = Math.atan2(dx, dz);
  obj.rotation.x = 0;
  obj.rotation.z = 0;
}

// ══════════════════════════════════════════════════════════════
// PHASE 2: WEAPON TRANSFORM
// ══════════════════════════════════════════════════════════════
function startTransform() {
  if (phase !== 'evo_card') return;
  ensureAudio(); phase = 'transform'; phaseTime = 0; clearHud();
  const evo = getEvo();
  evoCardGroup.visible = false;
  transformStart.copy(weaponGroup.position);
  weaponAttached = false;
  SFX.detach();

  if (renderer.xr.isPresenting) {
    const cp = new THREE.Vector3(); camera.getWorldPosition(cp);
    const cd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    transformTarget.copy(cp).add(cd.multiplyScalar(1.5));
    transformTarget.y = cp.y + 0.1;
  } else {
    transformTarget.set(0, 1.7, -1.5);
  }
  returnTarget.copy(transformStart);
}

function updateTransform(dt) {
  phaseTime += dt;
  const evo = getEvo();

  // 0-1s: detach fly-out
  if (phaseTime < 1.0) {
    const t = easeInOutCubic(phaseTime / 1.0);
    weaponGroup.position.lerpVectors(transformStart, transformTarget, t);
    weaponGroup.scale.setScalar(1 + t * 0.3);
    setStatus('Weapon detaching...');
  }

  // 1-4s: rainbow glow
  if (phaseTime >= 1.0 && phaseTime < 4.0) {
    const t = (phaseTime - 1.0) / 3.0;
    weaponGroup.position.copy(transformTarget);
    const hueSpeed = 1 + t*t*20;
    const hue = (phaseTime * hueSpeed * 0.1) % 1;
    const color = new THREE.Color().setHSL(hue, 1, 0.5 + t*0.3);
    coreMat.color.copy(color); glowSMat.color.copy(color);
    glowSMat.opacity = 0.2 + t*0.5;
    const pulse = 1.3 + Math.sin(phaseTime*(5+t*20))*0.15*t;
    weaponGroup.scale.setScalar(pulse);

    // Orbiting particles
    if (Math.random() < 0.3+t*0.4) {
      const a = Math.random()*Math.PI*2;
      spawnP(transformTarget.clone().add(new THREE.Vector3(Math.cos(a)*0.12, Math.sin(a)*0.12, (Math.random()-0.5)*0.08)),
        color.getHex(), new THREE.Vector3(Math.cos(a)*0.4, Math.sin(a)*0.4+0.2, (Math.random()-0.5)*0.2), 0.4);
    }
    if (phaseTime - lastHumTime > Math.max(0.05, 0.2-t*0.18)) { SFX.rainbowPeak(300+t*1200); lastHumTime = phaseTime; }
    setStatus(`Rainbow glow ${(t*100).toFixed(0)}%`);
  }

  // BURST at 4.0s
  if (phaseTime >= 4.0 && phaseTime < 4.05) {
    SFX.transformBurst();
    burst(transformTarget, 0xffffff, 60, 3);
    burst(transformTarget, evo.sigColor, 40, 2.5);
    ring(transformTarget, evo.sigColorAlt, 32, 0.8);
    ring(transformTarget, evo.sigColor, 24, 0.5);
    triggerFlash();
  }

  // 4-5.5s: new weapon appears
  if (phaseTime >= 4.0 && phaseTime < 5.5) {
    const t = (phaseTime - 4.0) / 1.5;
    coreMat.color.setHex(evo.sigColor); glowSMat.color.setHex(evo.sigColorAlt); glowSMat.opacity = 0.35;
    weaponGroup.scale.setScalar(2.0 - 0.7*easeOutCubic(t));
  }

  // 5.5-6.5s: return to hand
  if (phaseTime >= 5.5 && phaseTime < 6.5) {
    const t = easeInOutCubic((phaseTime - 5.5) / 1.0);
    weaponGroup.position.lerpVectors(transformTarget, returnTarget, t);
    weaponGroup.scale.setScalar(1.3);
    if (phaseTime < 5.55) { SFX.returnHand(); setStatus('Returning to hand...'); }
  }

  // Done
  if (phaseTime >= 6.5 && !evolved) {
    weaponAttached = true; evolved = true;
    weaponGroup.scale.setScalar(1.3);
    coreMat.color.setHex(evo.sigColor); glowSMat.color.setHex(evo.sigColorAlt); glowSMat.opacity = 0.3;
    // Activate aura orbs
    evo.auraColors.forEach((c, i) => {
      if (auraOrbs[i]) { auraOrbs[i].material.color.setHex(c); auraOrbs[i].material.opacity = 0.7; }
    });
    phase = 'done';
    const sh = '#' + evo.sigColor.toString(16).padStart(6,'0');
    addHud(`⚡ ${evo.name.toUpperCase()}`, sh);
    setStatus(`Evolution complete! ${evo.from} → ${evo.name}`);
  }
}

// ══════════════════════════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════════════════════════
function onDesktopClick(e) {
  ensureAudio();
  raycaster.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1), camera);

  // Cards
  if (phase === 'cards' && cardGroup.visible) {
    const hits = raycaster.intersectObjects(cardGroup.children, true);
    if (hits.length > 0) {
      const g = findCardGroupFromFace(hits[0].object);
      if (g) { onCardSelected(g); return; }
    }
  }
  // Evo card
  if (phase === 'evo_card' && evoCardGroup.visible) {
    const hits = raycaster.intersectObjects(evoCardGroup.children, true);
    if (hits.length > 0) { startTransform(); return; }
  }
  // VR buttons (desktop too)
  const btnHits = raycaster.intersectObjects(vrBtnGroup.children, true);
  if (btnHits.length > 0) {
    let obj = btnHits[0].object;
    while (obj && !obj.userData?.onClick) obj = obj.parent;
    if (obj?.userData?.onClick) { obj.userData.onClick(); SFX.buttonClick(); return; }
  }
}

function onVRSelect(ctrl) {
  ensureAudio();
  const mat4 = new THREE.Matrix4().identity().extractRotation(ctrl.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  raycaster.ray.direction.set(0,0,-1).applyMatrix4(mat4);

  // Cards
  if (phase === 'cards' && cardGroup.visible) {
    const hits = raycaster.intersectObjects(cardGroup.children, true);
    if (hits.length > 0) {
      const g = findCardGroupFromFace(hits[0].object);
      if (g) { onCardSelected(g); return; }
    }
  }
  // Evo card
  if (phase === 'evo_card' && evoCardGroup.visible) {
    const hits = raycaster.intersectObjects(evoCardGroup.children, true);
    if (hits.length > 0) { startTransform(); return; }
  }
  // VR buttons
  const btnHits = raycaster.intersectObjects(vrBtnGroup.children, true);
  if (btnHits.length > 0) {
    let obj = btnHits[0].object;
    while (obj && !obj.userData?.onClick) obj = obj.parent;
    if (obj?.userData?.onClick) { obj.userData.onClick(); SFX.buttonClick(); return; }
  }
}

renderer.domElement.addEventListener('click', onDesktopClick);
renderer.domElement.addEventListener('mousemove', e => {
  raycaster.setFromCamera(new THREE.Vector2((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1), camera);
});

// Desktop toolbar
document.getElementById('weapon-sel').addEventListener('change', e => {
  selectedWeapon = e.target.value;
  weaponIdx = WEAPON_ORDER.indexOf(selectedWeapon);
  updateWeaponLabel();
  if (phase === 'idle') reset();
});
document.getElementById('btn-show').addEventListener('click', () => { ensureAudio(); showCards(); });
document.getElementById('btn-reset').addEventListener('click', () => { ensureAudio(); reset(); setStatus('Ready.'); });

// ══════════════════════════════════════════════════════════════
// ANIMATION HELPERS
// ══════════════════════════════════════════════════════════════
function wait(s) { return new Promise(r => setTimeout(r, s*1000)); }
function animScale(obj, tgt, dur, ease=easeInOutCubic) {
  return new Promise(res => { const s=obj.scale.x, t0=performance.now();
    (function step(){const t=Math.min((performance.now()-t0)/(dur*1000),1);obj.scale.setScalar(s+(tgt-s)*ease(t));if(t<1)requestAnimationFrame(step);else res();})();
  });
}
function animPos(obj, from, to, dur, ease=easeInOutCubic) {
  return new Promise(res => { const t0=performance.now();
    (function step(){const t=Math.min((performance.now()-t0)/(dur*1000),1);obj.position.lerpVectors(from,to,ease(t));if(t<1)requestAnimationFrame(step);else res();})();
  });
}

// ══════════════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════════════
function reset() {
  phase = 'idle'; phaseTime = 0; hoveredObj = null; prevHovered = null;
  weaponAttached = true; evolved = false;
  clearParticles(); clearHud();
  clearGrp(cardGroup); clearGrp(fusionGroup); clearGrp(evoCardGroup);
  cardGroup.visible = false; fusionGroup.visible = false; evoCardGroup.visible = false;
  flashBrightness = 0; flashFading = false;
  renderer.setClearColor(0x050008);
  weaponGroup.scale.setScalar(1);
  const evo = getEvo();
  coreMat.color.setHex(evo.baseColor); glowSMat.color.setHex(evo.baseColor); glowSMat.opacity = 0.2;
  auraOrbs.forEach(o => o.material.opacity = 0);
  currentCards = []; fusionCards = [];
}

// ══════════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.1);

  // Weapon attachment
  if (weaponAttached) updateWeaponPos();

  // Card warp
  if (phase === 'cards') { updateWarp(); updateHover(); applyHoverEffects(); }

  // Fusion
  if (phase === 'fusion') updateFusion(dt);

  // Evo card idle
  if (phase === 'evo_card') {
    phaseTime += dt;
    const card = evoCardGroup.children[0];
    if (card) {
      card.position.y += Math.sin(phaseTime*1.5)*0.0003;
      billboardY(card);
      const evo = getEvo();
      const c1 = new THREE.Color(evo.sigColor), c2 = new THREE.Color(evo.sigColorAlt);
      card.traverse(ch => { if(ch.isLineSegments) ch.material.color.copy(c1.clone().lerp(c2,(Math.sin(phaseTime*2)+1)/2)); });
    }
    updateHover(); applyHoverEffects();
  }

  // Transform
  if (phase === 'transform') updateTransform(dt);

  // Done — aura orbs orbit weapon
  if (phase === 'done') {
    const t = clock.elapsedTime;
    glowSMat.opacity = 0.25 + Math.sin(t*3)*0.08;
    auraOrbs.forEach((orb, i) => {
      if (orb.material.opacity <= 0) return;
      const a = t * (1.5 + i*0.7) + (i/auraOrbs.length)*Math.PI*2;
      orb.position.set(Math.cos(a)*0.1, Math.sin(a)*0.06, Math.sin(a)*0.1);
      orb.material.opacity = 0.5 + Math.sin(t*4+i)*0.2;
    });
    // Subtle aura particles
    if (Math.random() < 0.04) {
      const evo = getEvo();
      const a = Math.random()*Math.PI*2;
      spawnP(weaponGroup.position.clone().add(new THREE.Vector3(Math.cos(a)*0.08,Math.sin(a)*0.08,0)),
        evo.sigColor, new THREE.Vector3(0,0.3,0), 0.5);
    }
    updateHover(); applyHoverEffects(); // buttons still hoverable
  }

  // Idle — buttons hoverable
  if (phase === 'idle') { updateHover(); applyHoverEffects(); }

  // Particles
  updateParticles(dt);

  // Flash (works in VR via clear color)
  if (flashFading) {
    flashBrightness = Math.max(0, flashBrightness - dt * 4);
    const b = flashBrightness;
    renderer.setClearColor(new THREE.Color(0.02+b*0.98, 0, 0.03+b*0.97));
    if (flashBrightness <= 0) { flashFading = false; renderer.setClearColor(0x050008); }
  }

  // HUD follows camera (billboard)
  hudGroup.position.copy(camera.position);
  hudGroup.quaternion.copy(camera.quaternion);

  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
