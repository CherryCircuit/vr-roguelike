// ── Audio Engine (Web Audio API) ────────────────────────────
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick() {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, t);
  osc.frequency.exponentialRampToValueAtTime(600, t + 0.04);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.06);
}

function playWhoosh(freq = 200, duration = 0.3) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * duration;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(freq, t);
  bp.frequency.exponentialRampToValueAtTime(freq * 3, t + duration * 0.6);
  bp.frequency.exponentialRampToValueAtTime(100, t + duration);
  bp.Q.value = 2;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(0.12, t + duration * 0.15);
  g.gain.exponentialRampToValueAtTime(0.001, t + duration);
  src.connect(bp).connect(g).connect(audioCtx.destination);
  src.start(t); src.stop(t + duration);
}

function playImpact(freq = 80, duration = 0.5) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(20, t + duration);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + duration);
  // Noise layer
  const bufSize = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(0.2, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  src.connect(gn).connect(audioCtx.destination);
  src.start(t); src.stop(t + 0.1);
}

function playMagicalReveal() {
  ensureAudio();
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.08);
    g.gain.linearRampToValueAtTime(0.1, t + i * 0.08 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.6);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.6);
  });
}

function playHumm(targetFreq, duration) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(60, t);
  osc.frequency.exponentialRampToValueAtTime(targetFreq, t + duration);
  g.gain.setValueAtTime(0.03, t);
  g.gain.linearRampToValueAtTime(0.08, t + duration);
  g.gain.setValueAtTime(0.08, t + duration);
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 400;
  osc.connect(lp).connect(g);
  let node = g;
  // return { gain: g, osc } so we can stop later
  node.connect(audioCtx.destination);
  osc.start(t);
  return { osc, gain: g, stop: () => { osc.stop(audioCtx.currentTime); } };
}

    osc.frequency.value = f;
    g.gain.setValueAtTime(0.12, t + 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t + 0.1); osc.stop(t + 1.5);
  });
  // Rising sweep
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(100, t);
  osc.frequency.exponentialRampToValueAtTime(2000, t + 0.5);
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 800;
  osc.connect(lp).connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.6);
}

// Glow texture cache
const glowTexCache = {};
function getGlowTexture(r, g, b) {
  const key = `${r},${g},${b}`;
  if (glowTexCache[key]) return glowTexCache[key];
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(64, 64, 5, 64, 64, 60);
  grad.addColorStop(0, `rgba(${r},${g},${b},0.9)`);
  grad.addColorStop(0.3, `rgba(${r},${g},${b},0.6)`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  glowTexCache[key] = tex;
  return tex;
}

// ── Text Utilities ──────────────────────────────────────────
function makeTextTexture(text, opts = {}) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = opts.fontSize || 64;
  const font = `${opts.weight || 'bold'} ${fontSize}px ${fontFamily}`;
  ctx.font = font;

  let lines = [text];
  if (opts.maxWidth) {
    lines = [];
    const words = text.split(' ');
    let cur = '';
    for (const w of words) {
      const test = cur ? `${cur} ${w}` : w;
      if (ctx.measureText(test).width > opts.maxWidth && cur) {
        lines.push(cur);
        cur = w;
      } else {
        cur = test;
      }
    }
    if (cur) lines.push(cur);
  }

  const textWidth = opts.maxWidth || Math.ceil(Math.max(...lines.map(l => ctx.measureText(l).width)));
  const lineH = fontSize * 1.3;
  const textHeight = lines.length * lineH;
  const pad = opts.glow ? (opts.glowSize || 15) + 10 : 40;

  canvas.width = Math.ceil(textWidth) + pad * 2;
  canvas.height = Math.ceil(textHeight) + pad * 2;
  ctx.font = font;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (opts.glow) {
    ctx.shadowColor = opts.glowColor || opts.color || '#00ffff';
    ctx.shadowBlur = opts.glowSize || 15;
  }
  if (opts.shadow) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    lines.forEach((line, i) => {
      const y = canvas.height / 2 - ((lines.length - 1) * lineH / 2) + i * lineH;
      ctx.fillText(line, canvas.width / 2 + 2, y + 2);
    });
  }
  ctx.fillStyle = opts.color || '#00ffff';
  lines.forEach((line, i) => {
    const y = canvas.height / 2 - ((lines.length - 1) * lineH / 2) + i * lineH;
    ctx.fillText(line, canvas.width / 2, y);
  });

  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  return { texture: tex, aspect: canvas.width / canvas.height, w: canvas.width, h: canvas.height };
}

function makeTextSprite(text, opts = {}) {
  const { texture, aspect, w, h } = makeTextTexture(text, opts);
  const scale = opts.scale || 0.3;
  let sw, sh;
  if (opts.maxWidth) {
    const upp = scale / opts.maxWidth;
    sw = w * upp;
    sh = h * upp;
  } else {
    sw = aspect * scale;
    sh = scale;
  }
  const geo = new THREE.PlaneGeometry(sw, sh);
  const mat = new THREE.MeshBasicMaterial({
    map: texture, transparent: true,
    opacity: opts.opacity !== undefined ? opts.opacity : 1,
    depthTest: opts.depthTest !== undefined ? opts.depthTest : false,
    depthWrite: false, side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = opts.renderOrder !== undefined ? opts.renderOrder : 999;
  return mesh;
}

// ── Card Creation ───────────────────────────────────────────
function createUpgradeCard(upgrade, position) {
  const group = new THREE.Group();
  group.position.copy(position);
  group.userData.upgradeId = upgrade.id;

  const borderColor = typeof upgrade.color === 'string'
    ? parseInt(upgrade.color.replace('#', ''), 16) : (upgrade.color || 0x00ffff);

  // Background
  const card = new THREE.Mesh(cardGeo, new THREE.MeshBasicMaterial({
    color: 0x110033, transparent: true, opacity: 0.91,
    side: THREE.DoubleSide, depthWrite: false,
  }));
  card.renderOrder = 1;
  card.userData.isUpgradeCard = true;
  card.userData.upgradeId = upgrade.id;
  group.add(card);

  // Border
  group.add(new THREE.LineSegments(cardBorderGeo, new THREE.LineBasicMaterial({ color: borderColor })));

  // Hover glow
  const br = (borderColor >> 16) & 255, bg = (borderColor >> 8) & 255, bb = borderColor & 255;
  const glowMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1.2 * 1.3, 1.5 * 1.3),
    new THREE.MeshBasicMaterial({
      map: getGlowTexture(br, bg, bb), transparent: true, opacity: 0,
      depthTest: false, depthWrite: false,
    })
  );
  glowMesh.renderOrder = 0;
  glowMesh.position.z = -0.01;
  card.add(glowMesh);
  card.userData._hoverGlow = glowMesh;
  card.userData.borderColor = borderColor;

  // Name
  const nameSprite = makeTextSprite(upgrade.name.toUpperCase(), {
    fontSize: 65, color: upgrade.color || '#00ffff',
    glow: true, glowColor: upgrade.color, scale: 1, maxWidth: 600,
  });
  nameSprite.position.set(0, 0.55, 0.01);
  group.add(nameSprite);

  // Description
  const descSprite = makeTextSprite(upgrade.desc, {
    fontSize: 40, color: '#cccccc', scale: 1, maxWidth: 600, forceArial: true,
  });
  descSprite.position.set(0, 0.15, 0.01);
  group.add(descSprite);

  // Icon
  const icon = new THREE.Mesh(iconGeo,
    new THREE.MeshBasicMaterial({ color: borderColor, wireframe: true }));
  icon.position.set(0, -0.35, 0.05);
  group.add(icon);
  group.userData.iconMesh = icon;

  return group;
}

  card.userData.borderColor = mixColor.getHex();
  group.add(card);

  group.add(new THREE.LineSegments(cardBorderGeo, new THREE.LineBasicMaterial({ color: mixColor.getHex() })));

  // Rainbow glow
  const glowMesh = new THREE.Mesh(

    new THREE.MeshBasicMaterial({
      map: getGlowTexture(
        Math.round(mixColor.r * 255),
        Math.round(mixColor.g * 255),
        Math.round(mixColor.b * 255)

      transparent: true, opacity: 0, depthTest: false, depthWrite: false,

  glowMesh.renderOrder = 0;
  glowMesh.position.z = -0.01;
  card.add(glowMesh);
  card.userData._hoverGlow = glowMesh;

  // "★ EVOLUTION ★"
  const tag = makeTextSprite('★ EVOLUTION ★', {
    fontSize: 30, color: '#ffff00', glow: true, glowColor: '#ffff00', scale: 0.7,
  });
  tag.position.set(0, 0.65, 0.01);
  group.add(tag);

  // Evo name
  const nameSprite = makeTextSprite(evo.name.toUpperCase(), {
    fontSize: 55, color: '#ffffff', glow: true, glowColor: '#' + mixColor.getHexString(), scale: 0.9, maxWidth: 600,
  });
  nameSprite.position.set(0, 0.45, 0.01);
  group.add(nameSprite);

  // "From: <weapon>"
  const fromSprite = makeTextSprite('From: ' + evo.from, {
    fontSize: 28, color: '#888888', scale: 0.6, maxWidth: 600,
  });
  fromSprite.position.set(0, 0.28, 0.01);
  group.add(fromSprite);

  // Description
  const descSprite = makeTextSprite(evo.desc, {
    fontSize: 34, color: '#cccccc', scale: 0.9, maxWidth: 580,
  });
  descSprite.position.set(0, 0.08, 0.01);
  group.add(descSprite);

  // Icon (larger, dual-colored)
  const icon = new THREE.Mesh(new THREE.OctahedronGeometry(0.15, 0),
    new THREE.MeshBasicMaterial({ color: mixColor.getHex(), wireframe: true }));
  icon.position.set(0, -0.35, 0.05);
  group.add(icon);

  return group;
}

// ── Weapon Sphere (controller visual) ───────────────────────
function createWeaponSphere(color) {
  const group = new THREE.Group();
  // Core
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 16, 16),
    new THREE.MeshBasicMaterial({ color })
  );
  group.add(core);
  // Glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.055, 16, 16),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.4 })
  );
  group.add(glow);
  group.userData.core = core;
  group.userData.glow = glow;
  return group;
}

// ── Scene Setup ─────────────────────────────────────────────
async function init() {
  await loadFont();

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0014);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.6, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // VR button
  try {
    const vrBtn = VRButton.createButton(renderer, {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });
    document.body.appendChild(vrBtn);
    vrSupported = true;
  } catch (e) {
    console.warn('VR not available:', e);
  }

  // Ambient grid floor
  const gridHelper = new THREE.GridHelper(20, 40, 0x220044, 0x110033);
  scene.add(gridHelper);

  // Ambient light
  scene.add(new THREE.AmbientLight(0xffffff, 0.3));

  // Upgrade cards group
  upgradeCardsGroup = new THREE.Group();
  upgradeCardsGroup.visible = false;
  scene.add(upgradeCardsGroup);

  // Fusion group
  fusionGroup = new THREE.Group();
  fusionGroup.visible = false;
  scene.add(fusionGroup);

  // Evo card group
  evoCardGroup = new THREE.Group();
  evoCardGroup.visible = false;
  scene.add(evoCardGroup);

  // Weapon sphere
  weaponSphere = createWeaponSphere(0x00ffff);
  weaponSphere.visible = false;
  scene.add(weaponSphere);

  // White flash overlay
  const flashGeo = new THREE.PlaneGeometry(10, 10);
  const flashMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0,
    depthTest: false, depthWrite: false, side: THREE.DoubleSide,
  });
  const flashMesh = new THREE.Mesh(flashGeo, flashMat);
  flashMesh.position.set(0, 1.6, -1);
  flashMesh.renderOrder = 2000;
  scene.add(flashMesh);
  window._flash = flashMesh;

  // VR controllers
  if (vrSupported) {
    controllerL = renderer.xr.getController(0);
    controllerL.add(buildControllerLine());
    scene.add(controllerL);

    controllerR = renderer.xr.getController(1);
    controllerR.add(buildControllerLine());
    scene.add(controllerR);

    controllerL.addEventListener('selectstart', () => onVRSelect(controllerL));
    controllerR.addEventListener('selectstart', () => onVRSelect(controllerR));
  }

  // Desktop mouse events
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onDesktopClick);

  // Toolbar
  document.getElementById('weapon-select').addEventListener('change', e => {
    selectedWeapon = e.target.value;
    reset();
  });
  document.getElementById('btn-phase1').addEventListener('click', () => startPhase1());
  document.getElementById('btn-phase2').addEventListener('click', () => startPhase2());
  document.getElementById('btn-full').addEventListener('click', () => startFullSequence());
  document.getElementById('btn-reset').addEventListener('click', () => reset());

  window.addEventListener('resize', onResize);

  renderer.setAnimationLoop(animate);
}

function buildControllerLine() {
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, -3)
  ]);
  const mat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });
  return new THREE.Line(geo, mat);
}

// ── Card Display ────────────────────────────────────────────
function showUpgradeCards() {
  const evo = EVOLUTIONS[selectedWeapon];
  if (!evo) return;

  clearGroup(upgradeCardsGroup);
  upgradeCardsGroup.visible = true;

  // Build 3 upgrade choices: use the recipe items (guaranteed to trigger evolution)
  const upgrades = evo.recipe.map(id => getUpgradeDef(id)).filter(Boolean);

  // Positions: 3 upgrades + skip, centered
  const positions = [
    new THREE.Vector3(-CARD_SPACING * 1.5, CARD_Y, CARD_Z),
    new THREE.Vector3(0, CARD_Y, CARD_Z),
    new THREE.Vector3(CARD_SPACING * 1.5, CARD_Y, CARD_Z),
    new THREE.Vector3(0, CARD_Y - 1.1, CARD_Z), // skip below center
  ];

  upgrades.forEach((upg, i) => {
    const card = createUpgradeCard(upg, positions[i]);
    card.userData.isRecipeCard = true;
    card.userData.recipeIndex = i;
    upgradeCardsGroup.add(card);
  });

  const skip = createSkipCard(positions[3]);
  skip.userData.isRecipeCard = false;
  upgradeCardsGroup.add(skip);
}

function clearGroup(group) {
  while (group.children.length > 0) {
    const child = group.children[0];
    group.remove(child);
    disposeMesh(child);
  }
}

function disposeMesh(obj) {
  obj.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (child.material.map) child.material.map.dispose();
      child.material.dispose();
    }
  });
}

// ── Phase 1: Fusion ─────────────────────────────────────────
function startPhase1() {
  if (phase !== 'idle' && phase !== 'done') return;
  ensureAudio();
  phase = 'showing_cards';
  phaseTime = 0;
  setLabel('SHOWING CARDS');
  setStatus('Select a recipe card to begin fusion...');
  showUpgradeCards();
}

function onCardSelected(cardGroup) {
  if (phase !== 'showing_cards') return;

  const id = cardGroup.userData.upgradeId;
  if (id === 'SKIP') {
    playClick();
    reset();
    return;
  }

  const evo = EVOLUTIONS[selectedWeapon];
  const isRecipe = evo.recipe.includes(id);
  if (!isRecipe) {
    playClick();
    reset();
    return;
  }

  playClick();
  beginFusion(cardGroup);
}

function beginFusion(selectedCard) {
  phase = 'fusion';
  phaseTime = 0;
  setLabel('FUSION');

  const evo = EVOLUTIONS[selectedWeapon];
  const recipeIds = evo.recipe;

  // Get the selected card's world position
  const selPos = new THREE.Vector3();
  selectedCard.getWorldPosition(selPos);

  // Hide the main upgrade cards group
  upgradeCardsGroup.visible = false;

  // Create 3 recipe cards in the fusion group
  clearGroup(fusionGroup);
  fusionGroup.visible = true;

  const recipeCards = [];
  let selectedRecipeIdx = -1;

  recipeIds.forEach((id, i) => {
    const upg = getUpgradeDef(id);
    if (!upg) return;

    // Start position for the selected card: where it was
    // Start positions for other recipe cards: off-screen
    let startPos;
    if (selectedCard.userData.upgradeId === id) {
      startPos = selPos.clone();
      selectedRecipeIdx = i;
    } else {
      // Off-screen, coming from sides
      startPos = selPos.clone();
      startPos.x += (i % 2 === 0 ? -8 : 8);
      startPos.y += 2;
    }

    const card = createUpgradeCard(upg, startPos);
    card.userData.recipeIdx = i;
    card.userData.startPos = startPos.clone();
    card.userData.isSelected = (selectedCard.userData.upgradeId === id);
    fusionGroup.add(card);
    recipeCards.push(card);
  });

  fusionGroup.userData.recipeCards = recipeCards;
  fusionGroup.userData.selectedIdx = selectedRecipeIdx;
  fusionGroup.userData.targetCenter = new THREE.Vector3(0, CARD_Y, CARD_Z);

  // Play whoosh for non-selected cards fading
  playWhoosh(300, 0.4);

  setStatus('Recipe cards converging...');
}

function updateFusion(dt) {
  phaseTime += dt;
  const evo = EVOLUTIONS[selectedWeapon];
  const cards = fusionGroup.userData.recipeCards || [];
  const center = fusionGroup.userData.targetCenter;
  const selectedIdx = fusionGroup.userData.selectedIdx;

  if (cards.length < 3) { reset(); return; }

  // Phase timing:
  // 0-0.5: non-selected choice cards fade away (already done by not showing them)
  // 0-1.0: other recipe cards fly in from off-screen to triangle positions
  // 1.0-5.0: triangle rotation, speeding up, shrinking
  // 5.0-5.5: white flash
  // 5.5-6.0: evolution card appears

  const convergeEnd = 1.0;
  const rotateEnd = 5.0;
  const flashStart = 5.0;
  const flashEnd = 5.5;
  const evoAppearStart = 5.5;
  const evoAppearEnd = 6.5;

  // Converge phase: cards move to triangle positions
  if (phaseTime <= convergeEnd) {
    const t = Math.min(phaseTime / convergeEnd, 1);
    const eased = easeOutCubic(t);

    const initialRadius = 4.0;
    cards.forEach((card, i) => {
      const angle = (i / 3) * Math.PI * 2 - Math.PI / 2; // equilateral triangle
      const targetX = center.x + Math.cos(angle) * initialRadius;
      const targetY = center.y + Math.sin(angle) * initialRadius * 0.4;

      card.position.x = card.userData.startPos.x + (targetX - card.userData.startPos.x) * eased;
      card.position.y = card.userData.startPos.y + (targetY - card.userData.startPos.y) * eased;
      card.position.z = card.userData.startPos.z + (center.z - card.userData.startPos.z) * eased;
    });

    if (t > 0.3 && t < 0.35) playWhoosh(500, 0.3);
  }

  // Rotation phase
  if (phaseTime > convergeEnd && phaseTime <= rotateEnd) {
    const rotT = (phaseTime - convergeEnd) / (rotateEnd - convergeEnd);

    // Rotation speed ramps up
    const rotSpeed = 0.5 + rotT * 6.0; // radians/sec
    // Radius shrinks
    const radius = 4.0 * (1 - rotT * 0.85); // shrinks to 15% of original

    const baseAngle = phaseTime * rotSpeed;
    cards.forEach((card, i) => {
      const angle = baseAngle + (i / 3) * Math.PI * 2;
      // Orbit in horizontal plane (XY from player perspective, XZ in world)
      // Top-down view: equilateral triangle around center
      card.position.x = center.x + Math.cos(angle) * radius;
      card.position.y = center.y + Math.sin(angle) * radius * 0.4; // compressed vertically for perspective
      card.position.z = center.z; // stay at same depth

      // Billboard: face camera
      card.lookAt(camera.position);

      // Rainbow border glow
      const hue = (phaseTime * 0.5 + i * 0.33) % 1;
      const rainbowColor = new THREE.Color().setHSL(hue, 1, 0.5);
      card.children.forEach(child => {
        if (child.isLineSegments) {
          child.material.color.copy(rainbowColor);
        }
      });

      // Scale pulse
      const s = 1 + Math.sin(phaseTime * 3 + i) * 0.03 * rotT;
      card.scale.setScalar(s);
    });

    // Start hum on first frame
    if (!activeHum && rotT > 0.05) {
      activeHum = playHumm(200 + rotT * 600, 10);
    }

    setStatus(`Fusion rotating... ${(rotT * 100).toFixed(0)}%`);
  }

  // Flash phase
  if (phaseTime > flashStart && phaseTime <= flashEnd) {
    const ft = (phaseTime - flashStart) / (flashEnd - flashStart);
    window._flash.material.opacity = ft < 0.5 ? ft * 2 : (1 - ft) * 2;
    if (ft < 0.1) {
      playImpact(40, 0.6);
      cards.forEach(c => c.visible = false);
    }
    if (activeHum) { activeHum.stop(); activeHum = null; }
  }

  // Evo card appear
  if (phaseTime > evoAppearStart && phase === 'fusion') {
    const at = Math.min((phaseTime - evoAppearStart) / (evoAppearEnd - evoAppearStart), 1);
    if (!evoCardGroup.visible) {
      clearGroup(evoCardGroup);
      const evoCard = createEvoCard(evo);
      evoCard.position.copy(center);
      evoCard.position.z -= 0.3;
      evoCard.scale.setScalar(0.01);
      evoCardGroup.add(evoCard);
      evoCardGroup.visible = true;
      fusionGroup.visible = false;
      window._flash.material.opacity = 0;
      playMagicalReveal();
      setStatus('Evolution card revealed! Click to transform.');
    }
    const eased = easeOutBack(at);
    const card = evoCardGroup.children[0];
    if (card) {
      card.scale.setScalar(eased);
      card.lookAt(camera.position);
      card.traverse(c => {
        if (c.userData && c.userData._hoverGlow) {
          c.userData._hoverGlow.material.opacity = 0.3 + Math.sin(phaseTime * 4) * 0.15;
        }
      });
    }
    if (at >= 1) {
      phase = 'evo_card';
      phaseTime = 0; // reset for evo_card idle animation
      setLabel('EVO CARD');
      setStatus('Evolution card revealed! Click to transform.');
    }
  }
}

function updateEvoCard(dt) {
  phaseTime += dt;
  const evo = EVOLUTIONS[selectedWeapon];
  const card = evoCardGroup.children[0];
  if (!card) return;

  // Gentle hover animation
  card.position.y = CARD_Y + Math.sin(phaseTime * 1.5) * 0.05;
  card.lookAt(camera.position);

  // Rainbow border cycling
  const hue = (phaseTime * 0.3) % 1;
  const rainbow = new THREE.Color().setHSL(hue, 1, 0.6);
  card.traverse(c => {
    if (c.isLineSegments) c.material.color.copy(rainbow);
    if (c.userData && c.userData._hoverGlow) {
      const c1 = new THREE.Color(evo.sigColor);
      const c2 = new THREE.Color(evo.sigColorAlt);
      const mixed = c1.lerp(c2, (Math.sin(phaseTime * 2) + 1) / 2);
      c.material.color.copy(mixed);
      c.material.opacity = 0.25 + Math.sin(phaseTime * 3) * 0.1;
    }
  });
}

// ── Phase 2: Transform ─────────────────────────────────────
function startPhase2() {
  if (phase !== 'evo_card' && phase !== 'done') {
    // If we're idle, quickly show evo card first
    if (phase === 'idle') {
      // Just create the evo card directly
      const evo = EVOLUTIONS[selectedWeapon];
      clearGroup(evoCardGroup);
      const evoCard = createEvoCard(evo);
      evoCard.position.set(0, CARD_Y, CARD_Z);
      evoCardGroup.add(evoCard);
      evoCardGroup.visible = true;
      phase = 'evo_card';
    } else return;
  }

  phase = 'transform';
  phaseTime = 0;
  setLabel('TRANSFORM');

  // Hide evo card
  evoCardGroup.visible = false;

  // Show weapon sphere
  const evo = EVOLUTIONS[selectedWeapon];
  weaponSphere.visible = true;
  weaponSphere.position.set(0, CARD_Y, CARD_Z);
  weaponSphere.scale.setScalar(1);

  // Update sphere colors
  const core = weaponSphere.userData.core;
  const glow = weaponSphere.userData.glow;
  core.material.color.setHex(evo.sigColor);
  glow.material.color.setHex(evo.sigColorAlt);

  playImpact(60, 0.4);
  setStatus('Weapon transforming...');
}

function updateTransform(dt) {
  phaseTime += dt;
  const evo = EVOLUTIONS[selectedWeapon];
  const duration = 4.0;
  const t = Math.min(phaseTime / duration, 1);

  // Sphere grows
  const scale = 1 + easeOutCubic(t) * 4;
  weaponSphere.scale.setScalar(scale);

  // Pulse
  const pulse = 1 + Math.sin(phaseTime * 8) * 0.2 * (1 - t);
  weaponSphere.userData.glow.scale.setScalar(pulse);

  // Color cycling
  const hue = (phaseTime * 0.8) % 1;
  const rainbow = new THREE.Color().setHSL(hue, 1, 0.5);
  weaponSphere.userData.glow.material.color.copy(rainbow);

  // Orbiting particles would go here in the real game

  if (t >= 1) {
    // Burst!
    if (phaseTime < duration + 0.1) {
      playTransformBurst();
    }

    // Shrink back to normal with new color
    const burstT = Math.min((phaseTime - duration) / 1.0, 1);
    const finalScale = 1 + (1 - easeOutCubic(burstT)) * 3;
    weaponSphere.scale.setScalar(finalScale);
    weaponSphere.userData.core.material.color.setHex(evo.baseColor);
    weaponSphere.userData.glow.material.color.setHex(evo.sigColor);
    weaponSphere.userData.glow.material.opacity = 0.3 + burstT * 0.2;

    if (burstT >= 1) {
      phase = 'done';
      setLabel('DONE');
      setStatus(`Evolution complete! ${evo.name} ready. Press Reset to try again.`);
      playWhoosh(400, 0.4);
    }
  }
}

// ── Full Sequence ───────────────────────────────────────────
function startFullSequence() {
  reset();
  setTimeout(() => {
    startPhase1();
    // Auto-select first recipe card after a brief display
    setTimeout(() => {
      const cards = upgradeCardsGroup.children;
      if (cards.length > 0) {
        // Auto-select the first recipe card
        onCardSelected(cards[0]);
      }
    }, 1500);
    // Auto-select evo card after fusion
    const checkEvo = setInterval(() => {
      if (phase === 'evo_card') {
        clearInterval(checkEvo);
        setTimeout(() => startPhase2(), 2000);
      }
    }, 200);
  }, 100);
}

// ── Reset ───────────────────────────────────────────────────
function reset() {
  if (activeHum) { activeHum.stop(); activeHum = null; }
  phase = 'idle';
  phaseTime = 0;
  setLabel('IDLE');
  setStatus('Ready. Select a weapon and press a button.');

  upgradeCardsGroup.visible = false;
  fusionGroup.visible = false;
  evoCardGroup.visible = false;
  weaponSphere.visible = false;
  window._flash.material.opacity = 0;

  clearGroup(upgradeCardsGroup);
  clearGroup(fusionGroup);
  clearGroup(evoCardGroup);
}

// ── Interaction ─────────────────────────────────────────────
function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

function onDesktopClick(e) {
  ensureAudio();
  const clickMouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(clickMouse, camera);

  // Check upgrade cards
  if (upgradeCardsGroup.visible) {
    const hits = raycaster.intersectObjects(upgradeCardsGroup.children, true);
    if (hits.length > 0) {
      const group = findCardGroup(hits[0].object);
      if (group) onCardSelected(group);
    }
  }

  // Check evo card
  if (evoCardGroup.visible && phase === 'evo_card') {
    const hits = raycaster.intersectObjects(evoCardGroup.children, true);
    if (hits.length > 0) {
      startPhase2();
    }
  }
}

function onVRSelect(controller) {
  ensureAudio();
  const tempMatrix = new THREE.Matrix4();
  tempMatrix.identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

  if (upgradeCardsGroup.visible) {
    const hits = raycaster.intersectObjects(upgradeCardsGroup.children, true);
    if (hits.length > 0) {
      const group = findCardGroup(hits[0].object);
      if (group) onCardSelected(group);
    }
  }

  if (evoCardGroup.visible && phase === 'evo_card') {
    const hits = raycaster.intersectObjects(evoCardGroup.children, true);
    if (hits.length > 0) {
      startPhase2();
    }
  }
}

function findCardGroup(obj) {
  let cur = obj;
  while (cur) {
    if (cur.userData && (cur.userData.upgradeId || cur.userData.isUpgradeCard)) return cur;
    cur = cur.parent;
  }
  return null;
}

function updateHover() {
  // Reset previous hover
  if (hoveredCard) {
    hoveredCard.traverse(c => {
      if (c.userData && c.userData._hoverGlow) {
        c.material.opacity = 0;
      }
    });
    hoveredCard = null;
  }

  raycaster.setFromCamera(mouse, camera);

  const targets = [];
  if (upgradeCardsGroup.visible) targets.push(...upgradeCardsGroup.children);
  if (evoCardGroup.visible) targets.push(...evoCardGroup.children);

  if (targets.length === 0) return;

  const hits = raycaster.intersectObjects(targets, true);
  if (hits.length > 0) {
    const group = findCardGroup(hits[0].object);
    if (group) {
      hoveredCard = group;
      group.traverse(c => {
        if (c.userData && c.userData._hoverGlow) {
          c.material.opacity = 0.35;
        }
      });
    }
  }
}

// ── Easing ──────────────────────────────────────────────────
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

// ── UI Helpers ──────────────────────────────────────────────
function setLabel(text) { document.getElementById('phase-label').textContent = text; }
function setStatus(text) { document.getElementById('status').textContent = text; }
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── Animation Loop ──────────────────────────────────────────
function animate() {
  const dt = clock.getDelta();
  const now = clock.getElapsedTime();

  if (phase === 'fusion') updateFusion(dt);
  else if (phase === 'evo_card') updateEvoCard(dt);
  else if (phase === 'transform') updateTransform(dt);

  updateHover();

  renderer.render(scene, camera);
}

// ── Init ────────────────────────────────────────────────────
init().catch(e => {
  console.error('Init failed:', e);
  setStatus('Error: ' + e.message);
});
