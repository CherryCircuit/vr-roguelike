function makeTextSprite(text, opts = {}) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fontSize = opts.fontSize || 64;
  const font = `bold ${fontSize}px ${opts.forceArial ? 'Arial, sans-serif' : fontFamily}`;
  const maxWidth = opts.maxWidth || null;
  ctx.font = font;
  let lines = [text];
  if (maxWidth) {
    lines = [];
    const words = text.split(' ');
    let cur = '';
    for (const w of words) {
      const test = cur ? `${cur} ${w}` : w;
      if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);
  }
  const textWidth = maxWidth || Math.ceil(Math.max(...lines.map(l => ctx.measureText(l).width)));
  const lineHeight = fontSize * 1.3;
  const textHeight = lines.length * lineHeight;
  const pad = opts.glow ? 25 : 40;
  canvas.width = textWidth + pad * 2;
  canvas.height = textHeight + pad * 2;
  ctx.font = font;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (opts.glow) { ctx.shadowColor = opts.glowColor || opts.color || '#00ffff'; ctx.shadowBlur = 15; }
  if (opts.shadow) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    lines.forEach((line, i) => {
      const y = canvas.height / 2 - ((lines.length - 1) * lineHeight / 2) + i * lineHeight;
      ctx.fillText(line, canvas.width / 2 + 2, y + 2);
    });
  }
  ctx.fillStyle = opts.color || '#00ffff';
  lines.forEach((line, i) => {
    const y = canvas.height / 2 - ((lines.length - 1) * lineHeight / 2) + i * lineHeight;
    ctx.fillText(line, canvas.width / 2, y);
  });
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const aspect = canvas.width / canvas.height;
  const w = (opts.scale || 0.3) * aspect;
  const h = opts.scale || 0.3;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(w, h, 1);
  return sprite;
}

function getGlowTexture(r, g, b) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  grad.addColorStop(0, `rgba(${r},${g},${b},0.5)`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},0.2)`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

function createUpgradeCard(upgrade, position) {
  const group = new THREE.Group();
  group.position.copy(position);
  group.userData.upgradeId = upgrade.id;
  const bc = typeof upgrade.color === 'string' ? parseInt(upgrade.color.replace('#', ''), 16) : (upgrade.color || 0x00ffff);
  // Face
  const card = new THREE.Mesh(cardGeo, new THREE.MeshBasicMaterial({
    color: 0x110033, transparent: true, opacity: 0.91, side: THREE.DoubleSide, depthWrite: false,
  }));
  card.renderOrder = 1;
  card.userData.isUpgradeCard = true;
  card.userData.upgradeId = upgrade.id;
  card.userData.borderColor = bc;
  group.add(card);
  // Border
  group.add(new THREE.LineSegments(cardBorderGeo, new THREE.LineBasicMaterial({ color: bc })));
  // Glow
  const br = (bc >> 16) & 255, bg = (bc >> 8) & 255, bb = bc & 255;
  const glow = new THREE.Mesh(
    new THREE.PlaneGeometry(1.56, 1.95),
    new THREE.MeshBasicMaterial({ map: getGlowTexture(br, bg, bb), transparent: true, opacity: 0, depthTest: false, depthWrite: false })
  );
  glow.renderOrder = 998;
  glow.position.z = -0.01;
  card.add(glow);
  card.userData._hoverGlow = glow;
  // Name
  const nameSprite = makeTextSprite(upgrade.name.toUpperCase(), { fontSize: 65, color: upgrade.color || '#00ffff', glow: true, glowColor: upgrade.color, scale: 1, maxWidth: 600 });
  nameSprite.position.set(0, 0.55, 0.01);
  group.add(nameSprite);
  // Desc
  const descSprite = makeTextSprite(upgrade.desc, { fontSize: 40, color: '#cccccc', scale: 1, maxWidth: 600, forceArial: true });
  descSprite.position.set(0, 0.15, 0.01);
  group.add(descSprite);
  // Icon

  icon.position.set(0, -0.35, 0.05);
  group.add(icon);

    group.add(badge);
  }
  return group;
}

const particles = [];
const particleGeo = new THREE.SphereGeometry(0.015, 6, 6);

function spawnParticle(pos, color, vel, life = 1) {
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1, depthWrite: false });
  const mesh = new THREE.Mesh(particleGeo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  particles.push({ mesh, vel: vel.clone(), life, maxLife: life, mat });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { scene.remove(p.mesh); p.mat.dispose(); particles.splice(i, 1); continue; }
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mat.opacity = (p.life / p.maxLife);
    p.mesh.scale.setScalar(p.life / p.maxLife);
  }
}

function clearParticles() {
  particles.forEach(p => { scene.remove(p.mesh); p.mat.dispose(); });
  particles.length = 0;
}

function burstParticles(pos, color, count = 30, speed = 2) {
  for (let i = 0; i < count; i++) {
    const dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
    spawnParticle(pos, color, dir.multiplyScalar(speed * (0.5 + Math.random())), 0.5 + Math.random() * 0.5);
  }
}

function ringParticles(pos, color, count = 24, radius = 0.5) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const pPos = pos.clone().add(new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius * 0.5, (Math.random()-0.5)*0.1));
    const vel = new THREE.Vector3(Math.cos(angle) * 1.5, Math.sin(angle) * 1.5 + 0.5, (Math.random()-0.5)*0.3);
    spawnParticle(pPos, color, vel, 0.6 + Math.random() * 0.4);
  }
}

// AUDIO
// ══════════════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (AudioContext || webkitAudioContext)(); return audioCtx; }
function ensureAudio() { getAudio(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playTone(freq, dur, type = 'sine', vol = 0.12, detune = 0) {
  const ctx = getAudio(), osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = type; osc.frequency.value = freq; osc.detune.value = detune;
  g.gain.setValueAtTime(vol, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + dur);
}

function playNoise(dur, vol = 0.1) {
  const ctx = getAudio(), sz = ctx.sampleRate * dur, buf = ctx.createBuffer(1, sz, ctx.sampleRate);
  const d = buf.getChannelData(0); for (let i = 0; i < sz; i++) d[i] = Math.random()*2-1;
  const s = ctx.createBufferSource(); s.buffer = buf;
  const g = ctx.createGain(); g.gain.setValueAtTime(vol, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  s.connect(g); g.connect(ctx.destination); s.start();
}

function playChord(base, dur = 1) {
  playTone(base, dur, 'sine', 0.08);
  playTone(base * 1.25, dur, 'sine', 0.06);
  playTone(base * 1.5, dur, 'sine', 0.04);
  playTone(base * 2, dur, 'triangle', 0.03);
}

const SFX = {
  cardSelect: () => { playTone(880, 0.08, 'square', 0.08); playTone(1200, 0.06, 'sine', 0.04); },
  cardDismiss: () => playTone(220, 0.3, 'sine', 0.04),
  cardsZoomIn: () => { playTone(440, 0.4, 'sine', 0.06); playTone(660, 0.3, 'sine', 0.04, 5); },
  rotHum: (t) => playTone(100 + t * 400, 0.15, 'sawtooth', 0.015 + t * 0.03),
  whiteFlash: () => { playNoise(0.4, 0.18); playTone(1000, 0.3, 'square', 0.12); playChord(440, 0.8); },
  evoReveal: () => { playTone(660, 0.5, 'sine', 0.08); playTone(880, 0.4, 'sine', 0.06); playChord(523, 1); },
  detach: () => { playTone(220, 0.3, 'triangle', 0.08); playTone(330, 0.2, 'sine', 0.04); },
  rainbowStart: () => playTone(150, 2, 'sawtooth', 0.02),
  rainbowPeak: (f) => playTone(f, 0.2, 'sawtooth', 0.06),
  transformBurst: () => { playNoise(0.5, 0.22); playChord(523, 1.5); playTone(80, 0.4, 'sine', 0.12); },
  returnHand: () => playTone(440, 0.4, 'sine', 0.06),
  hover: () => playTone(600, 0.05, 'sine', 0.03),
};

// STATE

let phase = 'idle'; // idle | cards | fusion | evo_card | transform | done
let phaseTime = 0;
let selectedWeapon = 'plasma_carbine';
let currentCards = [];
let hoveredCard = null;
let activeHumId = null;
let lastHumTime = 0;
let selectedRecipeIdx = -1;

function getEvo() { return EVOLUTIONS[selectedWeapon]; }

function setStatus(t) { document.getElementById('status').textContent = t; }

function addHudText(text, color = '#ffffff', y = 2.5) {
  const s = makeTextSprite(text, { fontSize: 80, color, glow: true, glowColor: color, scale: 1.5, maxWidth: 800 });
  s.position.set(0, y, -4);
  hudGroup.add(s);
  return s;
}
function clearHud() {
  hudGroup.children.forEach(c => { c.traverse(m => { if (m.material?.map) m.material.map.dispose(); if (m.material) m.material.dispose(); }); });
  hudGroup.clear();
}

function clearGroup(g) {
  g.children.forEach(c => { c.traverse(m => { if (m.material?.map) m.material.map.dispose(); if (m.material) m.material.dispose(); }); });
  g.clear();
}

function screenFlash(duration = 0.5) {
  return new Promise(resolve => {
    flashMat.opacity = 1;
    const start = performance.now();
    function fade() {
      const t = Math.min((performance.now() - start) / (duration * 1000), 1);
      flashMat.opacity = 1 - t;
      if (t < 1) requestAnimationFrame(fade); else resolve();
    }
    fade();
  });
}

// ══════════════════════════════════════════════════════════════
// EASING
// ══════════════════════════════════════════════════════════════
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeOutBack(t) { const c = 2.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); }
function easeInBack(t) { const c = 2.70158; return (c+1)*t*t*t - c*t*t; }

// ══════════════════════════════════════════════════════════════
// SHOW UPGRADE CARDS
// ══════════════════════════════════════════════════════════════
function showCards() {
  reset();
  const evo = getEvo();
  // Build 3 upgrade cards: always include the 3 recipe items
  // Put the "final" recipe card in a random position (not the SKIP slot)
  const recipeUpgrades = evo.recipe.map(id => {
    const u = { ...UPGRADES[id] };
    u._isRecipePiece = true;
    return u;
  });
  // Shuffle which is the "final" piece
  selectedRecipeIdx = Math.floor(Math.random() * 3);

  currentCards = [];
  clearGroup(cardGroup);

  // Position card group 4m in front
  cardGroup.position.set(0, 1.6 + (-0.725), -4); // matching game's SCENE_Y_OFFSET

  recipeUpgrades.forEach((upg, i) => {
    const pos = new THREE.Vector3(CARD_POSITIONS[i], CARD_Y, CARD_Z);
    const card = createUpgradeCard(upg, pos);
    card.userData.isFinalRecipe = (i === selectedRecipeIdx);
    cardGroup.add(card);
    currentCards.push(card);
  });

  // SKIP card (rightmost)
  const skipCard = createSkipCard(new THREE.Vector3(CARD_POSITIONS[3], CARD_Y, CARD_Z));
  cardGroup.add(skipCard);
  currentCards.push(skipCard);

  // Warp-in animation (matching game's card entrance)
  currentCards.forEach((card, i) => {
    const basePos = card.position.clone();
    card.userData._warpBase = basePos;
    card.userData._warpActive = true;
    card.userData._warpStart = performance.now() + i * 110; // stagger
    card.userData._hoverScale = 1;
    card.position.y = basePos.y - 0.18;
    card.rotation.x = -0.16;
    card.scale.setScalar(0.7);
  });

  cardGroup.visible = true;
  phase = 'cards';
  phaseTime = 0;
  weaponAttached = true;

  // Update weapon color to base
  coreMat.color.setHex(evo.baseColor);
  glowMat.color.setHex(evo.baseColor);

  setStatus('Select an upgrade card — pick the recipe piece with the ⚡ EVO badge to trigger evolution');
}

// ══════════════════════════════════════════════════════════════
// CARD WARP-IN ANIMATION
// ══════════════════════════════════════════════════════════════
function updateCardWarp() {
  const now = performance.now();
  const dur = 420;
  let anyActive = false;
  currentCards.forEach(card => {
    if (!card.userData._warpActive) return;
    const elapsed = now - card.userData._warpStart;
    if (elapsed < 0) { anyActive = true; return; }
    const t = Math.min(elapsed / dur, 1);
    if (t >= 1) {
      card.position.copy(card.userData._warpBase);
      card.rotation.x = 0;
      card.scale.setScalar(card.userData._hoverScale);
      card.userData._warpActive = false;
      return;
    }
    anyActive = true;
    const s = 0.7 + 0.3 * easeOutBack(t);
    const yOff = (1 - easeOutCubic(t)) * 0.18;
    const tilt = (1 - easeOutCubic(t)) * 0.16;
    card.position.set(card.userData._warpBase.x, card.userData._warpBase.y - yOff, card.userData._warpBase.z);
    card.rotation.x = -tilt;
    card.scale.setScalar(s * card.userData._hoverScale);
  });
}

// ══════════════════════════════════════════════════════════════
// HOVER
// ══════════════════════════════════════════════════════════════
function findCardFace(obj) {
  let cur = obj;
  while (cur) {
    if (cur.userData?.isUpgradeCard) return cur;
    cur = cur.parent;
  }
  return null;
}

function findCardGroup(obj) {
  let cur = obj;
  while (cur) {
    if (cur.userData?.upgradeId !== undefined && !cur.userData.isUpgradeCard) return cur;
    if (cur.parent === cardGroup || cur.parent === evoCardGroup) return cur;
    cur = cur.parent;
  }
  return null;
}

function updateHover() {
  if (phase !== 'cards' && phase !== 'evo_card') { hoveredCard = null; return; }
  const targetGroup = phase === 'cards' ? cardGroup : evoCardGroup;
  raycaster.setFromCamera(pointerR, camera);
  const hits = raycaster.intersectObjects(targetGroup.children, true);
  const face = hits.length > 0 ? findCardFace(hits[0].object) : null;
  const group = hits.length > 0 ? findCardGroup(hits[0].object) : null;

  const newHovered = face || group;
  if (newHovered !== hoveredCard) {
    hoveredCard = newHovered;
    if (hoveredCard) SFX.hover();
  }
}

function applyHover() {
  currentCards.forEach(card => {
    const face = card.children.find(c => c.userData?.isUpgradeCard);
    if (!face) return;
    if (face === hoveredCard) {
      card.userData._hoverScale = THREE.MathUtils.lerp(card.userData._hoverScale || 1, 1.08, 0.15);
      if (face.userData._hoverGlow) face.userData._hoverGlow.material.opacity = THREE.MathUtils.lerp(face.userData._hoverGlow.material.opacity, 0.65, 0.15);
    } else {
      card.userData._hoverScale = THREE.MathUtils.lerp(card.userData._hoverScale || 1, 1, 0.12);
      if (face.userData._hoverGlow) face.userData._hoverGlow.material.opacity = THREE.MathUtils.lerp(face.userData._hoverGlow.material.opacity, 0, 0.12);
    }
    if (!card.userData._warpActive) card.scale.setScalar(card.userData._hoverScale);
  });
  // Evo card hover
  if (phase === 'evo_card' && evoCardGroup.children[0]) {
    const evoCard = evoCardGroup.children[0];
    const face = evoCard.children.find(c => c.userData?.isUpgradeCard);
    if (face) {
      if (face === hoveredCard) {
        evoCard.scale.lerp(new THREE.Vector3(1.08, 1.08, 1.08), 0.15);
        if (face.userData._hoverGlow) face.userData._hoverGlow.material.opacity = THREE.MathUtils.lerp(face.userData._hoverGlow.material.opacity, 0.65, 0.15);
      } else {
        evoCard.scale.lerp(new THREE.Vector3(1, 1, 1), 0.12);
        if (face.userData._hoverGlow) face.userData._hoverGlow.material.opacity = THREE.MathUtils.lerp(face.userData._hoverGlow.material.opacity, 0.3, 0.12);
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════
// CARD SELECTION
// ══════════════════════════════════════════════════════════════
function onCardSelected(card) {
  if (phase !== 'cards') return;
  ensureAudio();

  if (card.userData.upgradeId === 'SKIP') {
    SFX.cardDismiss();
    setStatus('You skipped! Click "Show Cards" to try again.');
    // Fade out cards
    currentCards.forEach(c => c.visible = false);
    setTimeout(() => showCards(), 1000);
    return;
  }

  if (!card.userData.isFinalRecipe) {
    // Selected a recipe piece that isn't the "final" one
    SFX.cardSelect();
    setStatus(`${card.userData.upgradeId} collected! But it's not the final piece... Click "Show Cards" to reset.`);
    currentCards.forEach(c => c.visible = false);
    setTimeout(() => showCards(), 1500);
    return;
  }

  // Final recipe piece selected — start Phase 1!
  SFX.cardSelect();
  startFusion(card);
}

// ══════════════════════════════════════════════════════════════
// PHASE 1: CARD FUSION
// ══════════════════════════════════════════════════════════════
let fusionCards = [];
let fusionCenter = new THREE.Vector3();

async function startFusion(selectedCard) {
  phase = 'fusion';
  phaseTime = 0;
  clearParticles();
  clearHud();

  const evo = getEvo();
  setStatus('Card Fusion — other choices fading...');

  // Get world position of the selected card as our center
  const selWorldPos = new THREE.Vector3();
  selectedCard.getWorldPosition(selWorldPos);
  fusionCenter.copy(selWorldPos);

  // Hide non-selected cards (skip + other non-recipe cards)
  currentCards.forEach(card => {
    if (card === selectedCard) return;
    if (card.userData.upgradeId === 'SKIP' || !card.userData.isFinalRecipe) {
      // Shrink away
      animateScale(card, 0.01, 0.4, easeInBack);
    }
  });

  await wait(0.5);

  // The selected card stays. Get the other 2 recipe cards.
  const otherRecipeCards = currentCards.filter(c => c.userData.upgradeId !== 'SKIP' && c !== selectedCard);
  const allThreeRecipeCards = [selectedCard, ...otherRecipeCards];

  // Hide the card group, move the 3 recipe cards to fusion group
  cardGroup.visible = false;
  clearGroup(fusionGroup);
  fusionGroup.visible = true;

  // Create fresh copies of all 3 recipe cards in the fusion group
  fusionCards = [];
  const recipeData = evo.recipe.map(id => { const u = { ...UPGRADES[id] }; u._isRecipePiece = true; return u; });

  // Selected card at center, other two fly in from off-screen
  const selectedCopy = createUpgradeCard(recipeData[selectedRecipeIdx], new THREE.Vector3(0, 0, 0));
  selectedCopy.position.copy(selWorldPos);
  fusionGroup.add(selectedCopy);
  fusionCards.push(selectedCopy);

  // Other 2 from off-screen
  const startPositions = [
    new THREE.Vector3(selWorldPos.x - 6, selWorldPos.y + 2, selWorldPos.z),
    new THREE.Vector3(selWorldPos.x + 6, selWorldPos.y - 1, selWorldPos.z),
  ];
  const otherIndices = [0, 1, 2].filter(i => i !== selectedRecipeIdx);

  for (let j = 0; j < 2; j++) {
    const card = createUpgradeCard(recipeData[otherIndices[j]], new THREE.Vector3(0, 0, 0));
    card.position.copy(startPositions[j]);
    card.scale.setScalar(0.01);
    card.lookAt(camera.position);
    fusionGroup.add(card);
    fusionCards.push(card);
  }

  SFX.cardsZoomIn();
  setStatus('Recipe cards arriving...');

  // Animate other 2 flying in
  await Promise.all([
    animatePosition(fusionCards[1], startPositions[0], fusionCenter, 0.6, easeOutBack),
    animateScale(fusionCards[1], 1, 0.5, easeOutBack),
    animatePosition(fusionCards[2], startPositions[1], fusionCenter, 0.6, easeOutBack),
    animateScale(fusionCards[2], 1, 0.5, easeOutBack),
  ]);

  await wait(0.3);
  setStatus('Triangle rotation — accelerating...');
}

function updateFusion(dt) {
  phaseTime += dt;
  const evo = getEvo();

  // Phase timing
  const convergeTime = 0; // already converged
  const rotStart = 0;
  const rotEnd = 3.5;
  const flashStart = 3.5;
  const evoStart = 4.0;
  const evoEnd = 4.8;

  // Rotation phase
  if (phaseTime >= rotStart && phaseTime <= rotEnd) {
    const rotT = (phaseTime - rotStart) / (rotEnd - rotStart);
    const rotSpeed = 0.5 + rotT * rotT * 8; // accelerating
    const radius = 1.5 * (1 - rotT * 0.9); // shrinks from 1.5 to 0.15
    const baseAngle = phaseTime * rotSpeed;

    fusionCards.forEach((card, i) => {
      const angle = baseAngle + (i / 3) * Math.PI * 2;
      // Orbit in horizontal plane (XZ in world space, viewed from front)
      card.position.x = fusionCenter.x + Math.cos(angle) * radius;
      card.position.z = fusionCenter.z + Math.sin(angle) * radius * 0.6; // perspective foreshortening
      card.position.y = fusionCenter.y + Math.sin(angle) * radius * 0.3; // slight vertical wobble
      // Billboard: always face camera
      card.lookAt(camera.position);

      // Rainbow border glow
      const hue = (phaseTime * 0.5 + i * 0.33) % 1;
      const rainbow = new THREE.Color().setHSL(hue, 1, 0.5);
      card.traverse(c => {
        if (c.isLineSegments) c.material.color.copy(rainbow);
        if (c.userData?._hoverGlow) {
          c.userData._hoverGlow.material.opacity = rotT * 0.5;
          c.userData._hoverGlow.material.color.copy(rainbow);
        }
      });

      // Scale pulse
      const s = 1 + Math.sin(phaseTime * 3 + i) * 0.03 * rotT;
      card.scale.setScalar(s);
    });

    // Sparkle particles
    if (Math.random() < rotT * 0.6) {
      const a = Math.random() * Math.PI * 2;
      const r = radius * (0.5 + Math.random());
      const pPos = fusionCenter.clone().add(new THREE.Vector3(Math.cos(a)*r, Math.sin(a)*r*0.5, Math.sin(a)*r*0.6));
      const hue2 = (phaseTime * 0.8) % 1;
      spawnParticle(pPos, new THREE.Color().setHSL(hue2, 1, 0.7).getHex(), new THREE.Vector3(0, 0.5, 0), 0.4);
    }

    // Hum SFX
    if (phaseTime - lastHumTime > Math.max(0.08, 0.3 - rotT * 0.25)) {
      SFX.rotHum(rotT);
      lastHumTime = phaseTime;
    }

    setStatus(`Fusion ${(rotT * 100).toFixed(0)}%`);
  }

  // Flash
  if (phaseTime >= flashStart && phaseTime < flashStart + 0.01) {
    SFX.whiteFlash();
    burstParticles(fusionCenter, 0xffffff, 50, 3);
    burstParticles(fusionCenter, evo.sigColor, 30, 2);
    ringParticles(fusionCenter, evo.sigColor, 24, 0.5);
    fusionCards.forEach(c => c.visible = false);
  }

  // Evo card appear
  if (phaseTime >= evoStart && phase === 'fusion') {
    const at = Math.min((phaseTime - evoStart) / (evoEnd - evoStart), 1);
    if (!evoCardGroup.visible) {
      clearGroup(evoCardGroup);
      const evoCard = createEvoCard(evo);
      evoCard.position.copy(fusionCenter);
      evoCard.position.z -= 0.2;
      evoCard.scale.setScalar(0.01);
      evoCard.lookAt(camera.position);
      evoCardGroup.add(evoCard);
      evoCardGroup.visible = true;
      fusionGroup.visible = false;
      clearParticles();
      SFX.evoReveal();
      setStatus('⚡ Evolution card revealed! Hover and click/trigger to transform your weapon.');
    }
    const eased = easeOutBack(at);
    const card = evoCardGroup.children[0];
    if (card) {
      card.scale.setScalar(eased);
      card.lookAt(camera.position);
    }
    if (at >= 1) {
      phase = 'evo_card';
      phaseTime = 0;
    }
  }
}

// ══════════════════════════════════════════════════════════════
// PHASE 2: WEAPON TRANSFORM
// ══════════════════════════════════════════════════════════════
let transformTarget = new THREE.Vector3();
let transformStart = new THREE.Vector3();
let returnTarget = new THREE.Vector3();

function startTransform() {
  if (phase !== 'evo_card') return;
  ensureAudio();
  phase = 'transform';
  phaseTime = 0;
  clearHud();

  const evo = getEvo();
  evoCardGroup.visible = false;

  // Record where the weapon currently is
  transformStart.copy(weaponGroup.position);

  // Detach weapon from controller
  weaponAttached = false;
  SFX.detach();
  setStatus('Weapon detaching...');

  // Float out to midfield (1.5m in front at eye level)
  if (renderer.xr.isPresenting) {
    const camPos = new THREE.Vector3();
    camera.getWorldPosition(camPos);
    const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    transformTarget.copy(camPos).add(camDir.multiplyScalar(1.5));
    transformTarget.y = camPos.y + 0.1; // slightly above eye level for visibility
  } else {
    transformTarget.set(0, 1.7, -1.5);
  }

  returnTarget.copy(transformStart); // where to return to
}

function updateTransform(dt) {
  phaseTime += dt;
  const evo = getEvo();
  const totalDur = 6.5;

  // Detach fly-out: 0 - 1.0s
  if (phaseTime < 1.0) {
    const t = easeInOutCubic(phaseTime / 1.0);
    weaponGroup.position.lerpVectors(transformStart, transformTarget, t);
    // Grow slightly as it moves
    const s = 1 + t * 0.3;
    weaponGroup.scale.setScalar(s);
    if (phaseTime > 0.95) setStatus('Rainbow glow cycle...');
  }

  // Rainbow glow: 1.0 - 4.0s
  if (phaseTime >= 1.0 && phaseTime < 4.0) {
    const t = (phaseTime - 1.0) / 3.0;
    weaponGroup.position.copy(transformTarget);

    // Rainbow color cycling — accelerating
    const hueSpeed = 1 + t * t * 20;
    const hue = (phaseTime * hueSpeed * 0.1) % 1;
    const color = new THREE.Color().setHSL(hue, 1, 0.5 + t * 0.3);
    coreMat.color.copy(color);
    glowMat.color.copy(color);
    glowMat.opacity = 0.2 + t * 0.5;

    // Pulse scale
    const pulse = 1.3 + Math.sin(phaseTime * (5 + t * 20)) * 0.15 * t;
    weaponGroup.scale.setScalar(pulse);

    // Orbiting ring particles
    if (Math.random() < 0.3 + t * 0.4) {
      const angle = Math.random() * Math.PI * 2;
      const r = 0.12;
      const pPos = transformTarget.clone().add(new THREE.Vector3(Math.cos(angle)*r, Math.sin(angle)*r, (Math.random()-0.5)*0.08));
      spawnParticle(pPos, color.getHex(), new THREE.Vector3(Math.cos(angle)*0.4, Math.sin(angle)*0.4+0.2, (Math.random()-0.5)*0.2), 0.4);
    }

    // SFX
    if (phaseTime - lastHumTime > Math.max(0.06, 0.25 - t * 0.2)) {
      SFX.rainbowPeak(300 + t * 1200);
      lastHumTime = phaseTime;
    }

    setStatus(`Rainbow glow ${(t * 100).toFixed(0)}%`);
  }

  // BURST: at 4.0s
  if (phaseTime >= 4.0 && phaseTime < 4.05) {
    SFX.transformBurst();
    burstParticles(transformTarget, 0xffffff, 60, 3);
    burstParticles(transformTarget, evo.sigColor, 40, 2.5);
    ringParticles(transformTarget, evo.sigColorAlt, 32, 0.8);
    screenFlash(0.4);
  }

  // New weapon appears + shrinks back: 4.0 - 5.5s
  if (phaseTime >= 4.0 && phaseTime < 5.5) {
    const t = (phaseTime - 4.0) / 1.5;
    // New colors
    coreMat.color.setHex(evo.sigColor);
    glowMat.color.setHex(evo.sigColorAlt);
    glowMat.opacity = 0.35;
    // Scale down from burst size to 1.3 (evolved = 30% bigger)
    const s = 2.0 - 0.7 * easeOutCubic(t);
    weaponGroup.scale.setScalar(s);
  }

  // Return to hand: 5.5 - 6.5s
  if (phaseTime >= 5.5 && phaseTime < 6.5) {
    const t = easeInOutCubic((phaseTime - 5.5) / 1.0);
    weaponGroup.position.lerpVectors(transformTarget, returnTarget, t);
    weaponGroup.scale.setScalar(1.3); // evolved size
    if (phaseTime < 5.55) {
      SFX.returnHand();
      setStatus('Weapon returning to hand...');
    }
  }

  // Done
  if (phaseTime >= 6.5) {
    weaponAttached = true;
    weaponGroup.scale.setScalar(1.3);
    coreMat.color.setHex(evo.sigColor);
    glowMat.color.setHex(evo.sigColorAlt);
    glowMat.opacity = 0.3;
    phase = 'done';
    const sigHex = '#' + evo.sigColor.toString(16).padStart(6, '0');
    addHudText(`⚡ ${evo.name.toUpperCase()}`, sigHex);
    setStatus(`Evolution complete! ${evo.from} → ${evo.name}. Press Reset to try again.`);
  }
}

// ══════════════════════════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════════════════════════
function onDesktopClick(e) {
  ensureAudio();
  const mouse = new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouse, camera);

  if (phase === 'cards' && cardGroup.visible) {
    const hits = raycaster.intersectObjects(cardGroup.children, true);
    if (hits.length > 0) {
      const g = findCardGroup(hits[0].object);
      if (g) { onCardSelected(g); return; }
    }
  }

  if (phase === 'evo_card' && evoCardGroup.visible) {
    const hits = raycaster.intersectObjects(evoCardGroup.children, true);
    if (hits.length > 0) { startTransform(); return; }
  }
}

function onVRSelect(controller) {
  ensureAudio();
  const mat4 = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(mat4);

  if (phase === 'cards' && cardGroup.visible) {
    const hits = raycaster.intersectObjects(cardGroup.children, true);
    if (hits.length > 0) {
      const g = findCardGroup(hits[0].object);
      if (g) { onCardSelected(g); return; }
    }
  }

  if (phase === 'evo_card' && evoCardGroup.visible) {
    const hits = raycaster.intersectObjects(evoCardGroup.children, true);
    if (hits.length > 0) { startTransform(); return; }
  }
}

function onMouseMove(e) {
  pointerR.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
}

renderer.domElement.addEventListener('click', onDesktopClick);
renderer.domElement.addEventListener('mousemove', onMouseMove);

// Desktop buttons
document.getElementById('weapon-sel').addEventListener('change', e => { selectedWeapon = e.target.value; });
document.getElementById('btn-show-cards').addEventListener('click', () => { ensureAudio(); showCards(); });
document.getElementById('btn-reset').addEventListener('click', () => { ensureAudio(); reset(); setStatus('Ready. Click "Show Cards" to preview.'); });

// ══════════════════════════════════════════════════════════════
// ANIMATION HELPERS
// ══════════════════════════════════════════════════════════════
function wait(s) { return new Promise(r => setTimeout(r, s * 1000)); }

function animateScale(obj, target, dur, ease = easeInOutCubic) {
  return new Promise(resolve => {
    const start = obj.scale.x;
    const t0 = performance.now();
    function step() {
      const t = Math.min((performance.now() - t0) / (dur * 1000), 1);
      obj.scale.setScalar(start + (target - start) * ease(t));
      if (t < 1) requestAnimationFrame(step); else resolve();
    }
    step();
  });
}

function animatePosition(obj, from, to, dur, ease = easeInOutCubic) {
  return new Promise(resolve => {
    const t0 = performance.now();
    function step() {
      const t = Math.min((performance.now() - t0) / (dur * 1000), 1);
      const e = ease(t);
      obj.position.lerpVectors(from, to, e);
      if (t < 1) requestAnimationFrame(step); else resolve();
    }
    step();
  });
}

// ══════════════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════════════
function reset() {
  phase = 'idle';
  phaseTime = 0;
  hoveredCard = null;
  weaponAttached = true;
  clearParticles();
  clearHud();
  clearGroup(cardGroup);
  clearGroup(fusionGroup);
  clearGroup(evoCardGroup);
  cardGroup.visible = false;
  fusionGroup.visible = false;
  evoCardGroup.visible = false;
  flashMat.opacity = 0;
  weaponGroup.scale.setScalar(1);
  const evo = getEvo();
  coreMat.color.setHex(evo.baseColor);
  glowMat.color.setHex(evo.baseColor);
  glowMat.opacity = 0.2;
  currentCards = [];
  fusionCards = [];
}

// ══════════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.1);

  // Weapon attachment
  if (weaponAttached) updateWeaponAttachment();

  // Card warp animation
  if (phase === 'cards') {
    updateCardWarp();
    applyHover();
    updateHover();
  }

  // Fusion animation
  if (phase === 'fusion') {
    updateFusion(dt);
  }

  // Evo card idle
  if (phase === 'evo_card') {
    phaseTime += dt;
    const card = evoCardGroup.children[0];
    if (card) {
      card.position.y += Math.sin(phaseTime * 1.5) * 0.0003;
      card.lookAt(camera.position);
      // Rainbow border cycling on evo card
      const evo = getEvo();
      const hue = (phaseTime * 0.3) % 1;
      card.traverse(c => {
        if (c.isLineSegments) {
          const c1 = new THREE.Color(evo.sigColor);
          const c2 = new THREE.Color(evo.sigColorAlt);
          c.material.color.copy(c1.lerp(c2, (Math.sin(phaseTime * 2) + 1) / 2));
        }
      });
    }
    applyHover();
    updateHover();
  }

  // Transform animation
  if (phase === 'transform') {
    updateTransform(dt);
  }

  // Done state — gentle glow pulse on evolved weapon
  if (phase === 'done') {
    const evo = getEvo();
    glowMat.opacity = 0.25 + Math.sin(clock.elapsedTime * 3) * 0.08;
    // Subtle aura particles
    if (Math.random() < 0.05) {
      const wPos = weaponGroup.position.clone();
      const angle = Math.random() * Math.PI * 2;
      spawnParticle(wPos.clone().add(new THREE.Vector3(Math.cos(angle)*0.08, Math.sin(angle)*0.08, 0)),
        evo.sigColor, new THREE.Vector3(0, 0.3, 0), 0.5);
    }
  }

  // Particles
  updateParticles(dt);

  // Flash mesh follows camera
  flashMesh.position.copy(camera.position);
  flashMesh.position.z -= 1;
  flashMesh.quaternion.copy(camera.quaternion);

  // HUD follows camera
  hudGroup.position.copy(camera.position);
  hudGroup.quaternion.copy(camera.quaternion);

  // Card group follows camera in VR
  if (renderer.xr.isPresenting) {
    const camPos = new THREE.Vector3();
    camera.getWorldPosition(camPos);
    const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const target = camPos.clone().add(camDir.multiplyScalar(4));
    target.y = camPos.y - 0.725 + 0.9;
    cardGroup.position.lerp(target, 0.1);

    fusionGroup.position.copy(camera.position);
    fusionGroup.quaternion.copy(camera.quaternion);
    // Fusion center needs to track too
    // (it's set once, should be fine since it's in world space relative to camera at fusion start)

    evoCardGroup.position.lerp(target, 0.1);
  }

  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
