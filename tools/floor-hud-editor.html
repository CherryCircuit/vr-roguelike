<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor HUD Layout Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a; color: #e0e0e0;
            overflow: hidden; display: flex; height: 100vh;
        }
        #sidebar {
            width: 280px; background: #252525; padding: 16px;
            display: flex; flex-direction: column; border-right: 1px solid #333;
        }
        #viewport { flex: 1; position: relative; }
        #toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        button {
            background: #3a3a3a; border: 1px solid #555; color: #e0e0e0;
            padding: 8px 16px; cursor: pointer; border-radius: 4px; font-size: 13px;
        }
        button:hover { background: #4a4a4a; border-color: #777; }
        button.primary { background: #0066cc; border-color: #0080ff; }
        button.primary:hover { background: #0077dd; }
        button.danger { background: #662222; border-color: #883333; }
        button.danger:hover { background: #883333; }
        #selection-info {
            background: #2a2a2a; padding: 12px; border-radius: 4px; margin-bottom: 16px;
        }
        #selection-info h3 { font-size: 13px; color: #888; margin-bottom: 8px; }
        #selected-name { font-size: 16px; font-weight: 600; color: #4af; margin-bottom: 12px; }
        .coord-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .coord-input { flex: 1; }
        .coord-input label { display: block; font-size: 11px; color: #888; margin-bottom: 2px; }
        .coord-input input {
            width: 100%; background: #333; border: 1px solid #444; color: #fff;
            padding: 6px 8px; border-radius: 3px; font-size: 13px;
        }
        .coord-input input:focus { outline: none; border-color: #4af; }
        #elements-list {
            flex: 1; overflow-y: auto; background: #2a2a2a;
            border-radius: 4px; padding: 8px;
        }
        #elements-list h3 { font-size: 13px; color: #888; margin-bottom: 8px; padding: 4px; }
        .element-item {
            padding: 8px 10px; cursor: pointer; border-radius: 3px;
            font-size: 13px; margin-bottom: 2px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .element-item:hover { background: #333; }
        .element-item.selected { background: #0066cc; }
        .element-item .name { font-weight: 500; }
        .element-item .pos { color: #888; font-size: 11px; }
        .element-item.selected .pos { color: #aac; }
        #canvas { width: 100%; height: 100%; }
        #instructions {
            position: absolute; bottom: 16px; left: 16px;
            background: rgba(0,0,0,0.7); padding: 12px 16px;
            border-radius: 4px; font-size: 12px; color: #aaa;
        }
        #instructions kbd {
            background: #444; padding: 2px 6px; border-radius: 3px; font-family: monospace;
        }
        .color-swatch {
            display: inline-block; width: 12px; height: 12px;
            border-radius: 2px; margin-right: 6px; vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="toolbar">
            <button class="primary" onclick="exportJSON()">Export JSON</button>
            <button onclick="document.getElementById('importFile').click()">Import JSON</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
            <button onclick="undo()">Undo</button>
        </div>
        
        <div id="selection-info">
            <h3>SELECTED ELEMENT</h3>
            <div id="selected-name">None</div>
            <div style="font-size:11px;color:#666;margin-bottom:4px;font-weight:600">POSITION</div>
            <div class="coord-row">
                <div class="coord-input"><label>X</label><input type="number" step="0.01" id="input-x" onchange="updatePositionFromInput()"></div>
                <div class="coord-input"><label>Y</label><input type="number" step="0.01" id="input-y" onchange="updatePositionFromInput()"></div>
                <div class="coord-input"><label>Z</label><input type="number" step="0.01" id="input-z" onchange="updatePositionFromInput()"></div>
            </div>
            <div style="font-size:11px;color:#666;margin:6px 0 4px;font-weight:600">SCALE</div>
            <div class="coord-row">
                <div class="coord-input"><label>W</label><input type="number" step="0.01" id="input-sw" onchange="updatePositionFromInput()"></div>
                <div class="coord-input"><label>H</label><input type="number" step="0.01" id="input-sh" onchange="updatePositionFromInput()"></div>
            </div>
            <button onclick="resetSelectedPosition()">Reset Position</button>
        </div>
        
        <div id="elements-list">
            <h3>ELEMENTS</h3>
            <div id="elements-container"></div>
        </div>
    </div>
    
    <div id="viewport">
        <canvas id="canvas"></canvas>
        <div id="instructions">
            <kbd>Click</kbd> Select &nbsp;|&nbsp; 
            <kbd>Drag gizmo</kbd> Move on axis &nbsp;|&nbsp; 
            <kbd>Right-drag</kbd> Orbit &nbsp;|&nbsp; 
            <kbd>Scroll</kbd> Zoom &nbsp;|&nbsp;
            <kbd>Ctrl+Z</kbd> Undo
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        
        // Scene
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 200);
        camera.position.set(0, 3, 5);
        
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // Controls
        const orbitControls = new OrbitControls(camera, canvas);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.1;
        orbitControls.target.set(0, 0, -3);
        
        const transformControls = new TransformControls(camera, canvas);
        transformControls.setMode('translate');
        scene.add(transformControls);
        
        transformControls.addEventListener('dragging-changed', (event) => {
            orbitControls.enabled = !event.value;
        });
        
        // Grid
        const gridHelper = new THREE.GridHelper(10, 20, 0x444444, 0x333333);
        scene.add(gridHelper);
        
        // HUD Group - tilted at -70° on X axis (-90° + 20° tilt)
        const hudGroup = new THREE.Group();
        hudGroup.position.set(0, 0.0, -3);
        hudGroup.rotation.x = -70 * Math.PI / 180;
        scene.add(hudGroup);
        
        // Element definitions (positions relative to HUD center)
        const elementDefs = [
            { id: 'hud_bg', name: 'HUD Background', color: 0x111122, width: 3.0, height: 1.2, x: 0, y: 0, z: 0, opacity: 0.3, label: null },
            { id: 'hearts', name: 'Lives Hearts', color: 0xcc3333, width: 0.8, height: 0.3, x: -1.1, y: 0.45, z: 0.01, label: 'LIVES' },
            { id: 'score_title', name: 'Score Title', color: 0xcccc33, width: 0.6, height: 0.2, x: -0.15, y: 0.45, z: 0.01, label: 'SCORE' },
            { id: 'score_num', name: 'Score Number', color: 0xcccc33, width: 0.5, height: 0.35, x: -0.15, y: 0.0, z: 0.01, label: '00000' },
            { id: 'level', name: 'Level', color: 0x00cccc, width: 0.7, height: 0.2, x: 0.5, y: 0.45, z: 0.01, label: 'LEVEL 1' },
            { id: 'kills', name: 'Kill Count', color: 0xffffff, width: 0.6, height: 0.25, x: 0.5, y: 0.0, z: 0.01, label: '0/0 KILLS' },
            { id: 'nuke_icon', name: 'Nuke Icon', color: 0xcccc33, width: 0.35, height: 0.35, x: 0.9, y: 0.45, z: 0.01, label: 'NUKE' },
            { id: 'nuke_count', name: 'Nuke Count', color: 0xcccc33, width: 0.35, height: 0.25, x: 1.3, y: 0.45, z: 0.01, label: 'x3' },
            { id: 'combo_text', name: 'Combo Text', color: 0xff8800, width: 1.2, height: 0.2, x: 0, y: -0.23, z: 0.01, label: 'ACCURACY BONUS' },
            { id: 'combo_bar', name: 'Combo Cooldown', color: 0xff8800, width: 0.8, height: 0.08, x: 0, y: -0.38, z: 0.01, label: 'COOLDOWN' },
            { id: 'scanline', name: 'Scan Line', color: 0x33ff66, width: 2.8, height: 0.02, x: 0, y: 0, z: 0.02, label: 'SCAN' }
        ];
        
        const elements = {};
        const initialPositions = {};
        const labels = [];
        
        // Create label as scene-level sprite (not child mesh) to avoid raycast interference
        function createLabel(text, colorHex, parentMesh) {
            if (!text) return;
            const c = document.createElement('canvas');
            const ctx = c.getContext('2d');
            c.width = 256; c.height = 64;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.font = 'bold 20px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, c.width / 2, c.height / 2);
            const texture = new THREE.CanvasTexture(c);
            const mat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(0.6, 0.15, 1);
            sprite.renderOrder = 9999;
            sprite.frustumCulled = false;
            sprite.userData._parent = parentMesh;
            sprite.userData._offsetY = parentMesh.userData.def.height / 2 + 0.1;
            scene.add(sprite); // add to scene, not to mesh
            return sprite;
        }
        
        // Create elements
        elementDefs.forEach(def => {
            const geometry = new THREE.PlaneGeometry(def.width, def.height);
            const material = new THREE.MeshBasicMaterial({ 
                color: def.color,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: def.opacity || 0.85
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(def.x, def.y, def.z);
            mesh.userData = { id: def.id, name: def.name, def, originalColor: def.color };
            mesh.frustumCulled = false;
            
            hudGroup.add(mesh);
            elements[def.id] = mesh;
            initialPositions[def.id] = { x: def.x, y: def.y, z: def.z };
            
            const label = createLabel(def.label, def.color, mesh);
            if (label) labels.push(label);
        });
        
        // Selection
        let selectedElement = null;
        const OUTLINE_COLOR = 0x00ffff;
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        canvas.addEventListener('pointerdown', (event) => {
            if (event.button !== 0) return;
            
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const meshes = Object.values(elements);
            // Use recursive=false to only hit the meshes themselves, not children
            const intersects = raycaster.intersectObjects(meshes, false);
            
            if (intersects.length > 0) {
                selectElement(intersects[0].object);
            }
        });
        
        function selectElement(mesh) {
            if (selectedElement) {
                selectedElement.material.color.setHex(selectedElement.userData.originalColor);
            }
            
            saveUndoState();
            selectedElement = mesh;
            mesh.material.color.setHex(OUTLINE_COLOR);
            transformControls.attach(mesh);
            
            updateSelectionUI();
            updateElementsList();
        }
        
        function updateSelectionUI() {
            if (!selectedElement) {
                document.getElementById('selected-name').textContent = 'None';
                document.getElementById('input-x').value = '';
                document.getElementById('input-y').value = '';
                document.getElementById('input-z').value = '';
                return;
            }
            const pos = selectedElement.position;
            document.getElementById('selected-name').textContent = selectedElement.userData.name;
            document.getElementById('input-x').value = pos.x.toFixed(2);
            document.getElementById('input-y').value = pos.y.toFixed(2);
            document.getElementById('input-z').value = pos.z.toFixed(2);
            const geo = selectedElement.geometry;
            document.getElementById('input-sw').value = geo.parameters.width.toFixed(3);
            document.getElementById('input-sh').value = geo.parameters.height.toFixed(3);
        }
        
        window.updatePositionFromInput = function() {
            if (!selectedElement) return;
            saveUndoState();
            selectedElement.position.x = parseFloat(document.getElementById('input-x').value) || 0;
            selectedElement.position.y = parseFloat(document.getElementById('input-y').value) || 0;
            selectedElement.position.z = parseFloat(document.getElementById('input-z').value) || 0;
            const newW = parseFloat(document.getElementById('input-sw').value) || 0.1;
            const newH = parseFloat(document.getElementById('input-sh').value) || 0.1;
            selectedElement.geometry.dispose();
            selectedElement.geometry = new THREE.PlaneGeometry(newW, newH);
            updateElementsList();
        };
        
        window.resetSelectedPosition = function() {
            if (!selectedElement) return;
            saveUndoState();
            const initial = initialPositions[selectedElement.userData.id];
            selectedElement.position.set(initial.x, initial.y, initial.z);
            updateSelectionUI();
            updateElementsList();
        };
        
        function updateElementsList() {
            const container = document.getElementById('elements-container');
            container.innerHTML = '';
            elementDefs.forEach(def => {
                const mesh = elements[def.id];
                const pos = mesh.position;
                const item = document.createElement('div');
                item.className = 'element-item' + (selectedElement === mesh ? ' selected' : '');
                item.innerHTML = `
                    <span class="name"><span class="color-swatch" style="background:#${def.color.toString(16).padStart(6,'0')}"></span>${def.name}</span>
                    <span class="pos">(${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})</span>
                `;
                item.onclick = () => selectElement(mesh);
                container.appendChild(item);
            });
        }
        
        // ── Undo System (20 states) ──
        const undoStack = [];
        const MAX_UNDO = 20;
        
        function snapshotPositions() {
            const snap = {};
            Object.keys(elements).forEach(id => {
                const p = elements[id].position;
                snap[id] = { x: p.x, y: p.y, z: p.z };
            });
            return snap;
        }
        
        function saveUndoState() {
            undoStack.push(snapshotPositions());
            if (undoStack.length > MAX_UNDO) undoStack.shift();
        }
        
        window.undo = function() {
            if (undoStack.length === 0) return;
            const snap = undoStack.pop();
            Object.keys(snap).forEach(id => {
                if (elements[id]) {
                    elements[id].position.set(snap[id].x, snap[id].y, snap[id].z);
                }
            });
            updateSelectionUI();
            updateElementsList();
        };
        
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                window.undo();
            }
        });
        
        transformControls.addEventListener('mouseDown', () => {
            saveUndoState();
        });
        
        transformControls.addEventListener('objectChange', () => {
            updateSelectionUI();
            updateElementsList();
        });
        
        // Export/Import
        window.exportJSON = function() {
            const data = {
                editor: 'floor-hud',
                hudGroupPosition: { x: 0, y: 0, z: -3 },
                hudGroupRotation: { x: -70, y: 0, z: 0 },
                elements: {},
                exportedAt: new Date().toISOString()
            };
            Object.keys(elements).forEach(id => {
                const pos = elements[id].position;
                data.elements[id] = { x: parseFloat(pos.x.toFixed(3)), y: parseFloat(pos.y.toFixed(3)), z: parseFloat(pos.z.toFixed(3)), w: +parseFloat(selectedElement.geometry.parameters.width.toFixed(3)), h: +parseFloat(selectedElement.geometry.parameters.height.toFixed(3)) };
            });
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'floor-hud-layout.json';
            a.click(); URL.revokeObjectURL(url);
        };
        
        window.importJSON = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.elements) {
                        saveUndoState();
                        Object.keys(data.elements).forEach(id => {
                            if (elements[id]) {
                                const pos = data.elements[id];
                                elements[id].position.set(pos.x, pos.y, pos.z);
                            }
                        });
                        updateSelectionUI();
                        updateElementsList();
                    }
                } catch (err) { alert('Invalid JSON file'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        };
        
        // Resize
        function resize() {
            const container = document.getElementById('viewport');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        window.addEventListener('resize', resize);
        resize();
        
        // Animate — labels follow parent world position
        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            
            labels.forEach(label => {
                const parent = label.userData._parent;
                if (parent) {
                    parent.getWorldPosition(label.position);
                    label.position.y += label.userData._offsetY;
                }
            });
            
            renderer.render(scene, camera);
        }
        
        updateElementsList();
        animate();
    </script>
</body>
</html>
