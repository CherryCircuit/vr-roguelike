<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause Menu Layout Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a; color: #e0e0e0;
            overflow: hidden; display: flex; height: 100vh;
        }
        #sidebar {
            width: 300px; background: #252525; padding: 16px;
            display: flex; flex-direction: column; border-right: 1px solid #333;
            overflow-y: auto;
        }
        #viewport { flex: 1; position: relative; }
        #toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        button {
            background: #3a3a3a; border: 1px solid #555; color: #e0e0e0;
            padding: 8px 14px; cursor: pointer; border-radius: 4px; font-size: 13px;
        }
        button:hover { background: #4a4a4a; border-color: #777; }
        button.primary { background: #0066cc; border-color: #0080ff; }
        button.primary:hover { background: #0077dd; }
        #selection-info {
            background: #2a2a2a; padding: 12px; border-radius: 4px; margin-bottom: 12px;
        }
        #selection-info h3 { font-size: 13px; color: #888; margin-bottom: 8px; }
        #selected-name { font-size: 15px; font-weight: 600; color: #4af; margin-bottom: 10px; }
        .prop-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
        .prop-row label { font-size: 11px; color: #888; width: 14px; text-align: right; flex-shrink: 0; }
        .prop-row input {
            flex: 1; background: #333; border: 1px solid #444; color: #fff;
            padding: 5px 7px; border-radius: 3px; font-size: 13px; min-width: 0;
        }
        .prop-row input:focus { outline: none; border-color: #4af; }
        .prop-section { font-size: 11px; color: #666; margin: 6px 0 4px; font-weight: 600; text-transform: uppercase; }
        #elements-list {
            flex: 1; overflow-y: auto; background: #2a2a2a;
            border-radius: 4px; padding: 8px; min-height: 100px;
        }
        #elements-list h3 { font-size: 13px; color: #888; margin-bottom: 6px; }
        .element-item {
            padding: 5px 8px; cursor: pointer; border-radius: 3px;
            font-size: 12px; margin-bottom: 1px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .element-item:hover { background: #333; }
        .element-item.selected { background: #0066cc; }
        .element-item .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .element-item .pos { color: #888; font-size: 10px; flex-shrink: 0; margin-left: 4px; }
        .element-item.selected .pos { color: #aac; }
        .color-swatch {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 2px; margin-right: 5px; vertical-align: middle; flex-shrink: 0;
        }
        #canvas { width: 100%; height: 100%; }
        #instructions {
            position: absolute; bottom: 16px; left: 16px;
            background: rgba(0,0,0,0.7); padding: 10px 14px;
            border-radius: 4px; font-size: 11px; color: #aaa;
        }
        #instructions kbd {
            background: #444; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 11px;
        }
        .section-divider { border-top: 1px solid #333; margin: 8px 0; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="toolbar">
            <button class="primary" onclick="exportJSON()">Export JSON</button>
            <button onclick="document.getElementById('importFile').click()">Import JSON</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
            <button onclick="undo()">Undo</button>
            <button onclick="resetAll()">Reset All</button>
        </div>
        
        <div id="selection-info">
            <h3>SELECTED ELEMENT</h3>
            <div id="selected-name">None</div>
            <div class="prop-section">Position</div>
            <div class="prop-row"><label>X</label><input type="number" step="0.01" id="input-x" onchange="updateFromInput()"></div>
            <div class="prop-row"><label>Y</label><input type="number" step="0.01" id="input-y" onchange="updateFromInput()"></div>
            <div class="prop-row"><label>Z</label><input type="number" step="0.01" id="input-z" onchange="updateFromInput()"></div>
            <div class="prop-section">Scale</div>
            <div class="prop-row"><label>W</label><input type="number" step="0.01" id="input-sw" onchange="updateFromInput()"></div>
            <div class="prop-row"><label>H</label><input type="number" step="0.01" id="input-sh" onchange="updateFromInput()"></div>
        </div>
        
        <div id="elements-list">
            <h3>ELEMENTS <span style="float:right;color:#666;font-size:11px">click to select</span></h3>
            <div id="elements-container"></div>
        </div>
    </div>
    
    <div id="viewport">
        <canvas id="canvas"></canvas>
        <div id="instructions">
            <kbd>Click</kbd> Select &nbsp;|&nbsp; <kbd>Drag gizmo</kbd> Move &nbsp;|&nbsp; <kbd>Right-drag</kbd> Orbit &nbsp;|&nbsp; <kbd>Scroll</kbd> Zoom &nbsp;|&nbsp; <kbd>Ctrl+Z</kbd> Undo
        </div>
    </div>

    <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111118);
        const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 200);
        camera.position.set(0, 0, 5);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        
        const orbit = new OrbitControls(camera, canvas);
        orbit.enableDamping = true; orbit.dampingFactor = 0.1;
        
        const tc = new TransformControls(camera, canvas);
        tc.setMode('translate'); scene.add(tc);
        tc.addEventListener('dragging-changed', e => { orbit.enabled = !e.value; });
        
        const grid = new THREE.GridHelper(12, 24, 0x333344, 0x222233);
        grid.rotation.x = Math.PI / 2; scene.add(grid);
        
        // ── Element definitions matching the actual pause menu layout ──
        // Layout structure (top to bottom):
        //   LEFT BLASTER section (x≈-1.25)        RIGHT BLASTER section (x≈+1.25)
        //   Stats section (centered, below blasters)
        //   Resume button (bottom center)
        
        const defs = [
            // ── Panel ──
            { id:'panel', name:'Panel BG', color:0x0a0015, w:3.2, h:3.6, x:0, y:0, z:0 },
            
            // ── Left Blaster Section ──
            { id:'lb_title', name:'LEFT BLASTER', color:0x00ffff, w:1.4, h:0.18, x:-1.25, y:1.3, z:0.02, fontSize:12 },
            { id:'lb_weapon', name:'PLASMA CARBINE', color:0xffffff, w:1.2, h:0.12, x:-1.25, y:1.1, z:0.02, fontSize:10 },
            { id:'lb_sep1', name:'L-Sep1', color:0x00aaaa, w:1.8, h:0.025, x:-1.25, y:1.0, z:0.02 },
            { id:'lb_upg_header', name:'[UPGRADES]', color:0x888888, w:1.0, h:0.1, x:-1.25, y:0.9, z:0.02, fontSize:9 },
            { id:'lb_upg1', name:'🔥 RAPID FIRE x3', color:0xff8800, w:0.85, h:0.12, x:-1.48, y:0.76, z:0.02, fontSize:9 },
            { id:'lb_upg2', name:'⚡ DAMAGE UP x2', color:0xffff00, w:0.85, h:0.12, x:-1.02, y:0.76, z:0.02, fontSize:9 },
            { id:'lb_upg3', name:'🎯 HOMING x1', color:0x00ff00, w:0.85, h:0.12, x:-1.48, y:0.62, z:0.02, fontSize:9 },
            { id:'lb_sep2', name:'L-Sep2', color:0x00aaaa, w:1.8, h:0.025, x:-1.25, y:0.52, z:0.02 },
            { id:'lb_enemy_header', name:'[ENEMIES]', color:0x888888, w:1.0, h:0.1, x:-1.25, y:0.42, z:0.02, fontSize:9 },
            { id:'lb_enemy1', name:'👾 GRUNT x12', color:0xff6666, w:0.85, h:0.12, x:-1.48, y:0.28, z:0.02, fontSize:9 },
            { id:'lb_enemy2', name:'🤖 TANK x5', color:0xff6666, w:0.85, h:0.12, x:-1.02, y:0.28, z:0.02, fontSize:9 },
            { id:'lb_sep3', name:'L-Sep3', color:0x00aaaa, w:1.8, h:0.025, x:-1.25, y:0.18, z:0.02 },
            { id:'lb_kills', name:'KILLS: 24', color:0x00ffff, w:0.55, h:0.12, x:-1.58, y:0.04, z:0.02, fontSize:9 },
            { id:'lb_shots', name:'SHOTS: 156', color:0x00ffff, w:0.55, h:0.12, x:-1.25, y:0.04, z:0.02, fontSize:9 },
            { id:'lb_hits', name:'HITS: 89', color:0x00ffff, w:0.55, h:0.12, x:-0.92, y:0.04, z:0.02, fontSize:9 },
            { id:'lb_acc', name:'ACC: 57%', color:0x00ffff, w:0.55, h:0.12, x:-1.25, y:-0.12, z:0.02, fontSize:9 },
            
            // ── Right Blaster Section ──
            { id:'rb_title', name:'RIGHT BLASTER', color:0x00ffff, w:1.4, h:0.18, x:1.25, y:1.3, z:0.02, fontSize:12 },
            { id:'rb_weapon', name:'BLASTER', color:0xffffff, w:1.2, h:0.12, x:1.25, y:1.1, z:0.02, fontSize:10 },
            { id:'rb_sep1', name:'R-Sep1', color:0x00aaaa, w:1.8, h:0.025, x:1.25, y:1.0, z:0.02 },
            { id:'rb_upg_header', name:'[UPGRADES]', color:0x888888, w:1.0, h:0.1, x:1.25, y:0.9, z:0.02, fontSize:9 },
            { id:'rb_upg1', name:'🗡️ PIERCING x2', color:0xff0000, w:0.85, h:0.12, x:1.02, y:0.76, z:0.02, fontSize:9 },
            { id:'rb_upg2', name:'💫 SPREAD SHOT x1', color:0x00ffff, w:0.85, h:0.12, x:1.48, y:0.76, z:0.02, fontSize:9 },
            { id:'rb_sep2', name:'R-Sep2', color:0x00aaaa, w:1.8, h:0.025, x:1.25, y:0.52, z:0.02 },
            { id:'rb_enemy_header', name:'[ENEMIES]', color:0x888888, w:1.0, h:0.1, x:1.25, y:0.42, z:0.02, fontSize:9 },
            { id:'rb_enemy1', name:'💨 SPEEDER x8', color:0xff6666, w:0.85, h:0.12, x:1.02, y:0.28, z:0.02, fontSize:9 },
            { id:'rb_enemy2', name:'🔫 SHOOTER x3', color:0xff6666, w:0.85, h:0.12, x:1.48, y:0.28, z:0.02, fontSize:9 },
            { id:'rb_sep3', name:'R-Sep3', color:0x00aaaa, w:1.8, h:0.025, x:1.25, y:0.18, z:0.02 },
            { id:'rb_kills', name:'KILLS: 18', color:0x00ffff, w:0.55, h:0.12, x:0.92, y:0.04, z:0.02, fontSize:9 },
            { id:'rb_shots', name:'SHOTS: 94', color:0x00ffff, w:0.55, h:0.12, x:1.25, y:0.04, z:0.02, fontSize:9 },
            { id:'rb_hits', name:'HITS: 61', color:0x00ffff, w:0.55, h:0.12, x:1.58, y:0.04, z:0.02, fontSize:9 },
            { id:'rb_acc', name:'ACC: 65%', color:0x00ffff, w:0.55, h:0.12, x:1.25, y:-0.12, z:0.02, fontSize:9 },
            
            // ── Stats Section (centered) ──
            { id:'stats_title', name:'RUN STATISTICS', color:0xff00ff, w:1.6, h:0.2, x:0, y:0.84, z:0.02, fontSize:13 },
            { id:'stat_kills', name:'KILLS: 42', color:0x00ffff, w:1.2, h:0.14, x:0, y:0.44, z:0.02, fontSize:10 },
            { id:'stat_shots', name:'SHOTS: 250', color:0x00ffff, w:1.2, h:0.14, x:0, y:0.20, z:0.02, fontSize:10 },
            { id:'stat_hits', name:'HITS: 150', color:0x00ffff, w:1.2, h:0.14, x:0, y:-0.04, z:0.02, fontSize:10 },
            { id:'stat_acc2', name:'ACCURACY: 60%', color:0x00ffff, w:1.2, h:0.14, x:-1.08, y:-0.34, z:0.02, fontSize:10 },
            { id:'stat_streak', name:'STREAK: 7', color:0x00ffff, w:1.2, h:0.14, x:-1.08, y:-0.56, z:0.02, fontSize:10 },
            { id:'stat_boss', name:'BOSS: 1', color:0x00ffff, w:1.2, h:0.14, x:-1.08, y:-0.78, z:0.02, fontSize:10 },
            { id:'chart_area', name:'Chart Area', color:0x333344, w:1.7, h:0.9, x:1.1, y:-0.82, z:0.02 },
            
            // ── Resume Button ──
            { id:'resume', name:'RESUME', color:0x00aacc, w:1.4, h:0.4, x:0, y:-1.55, z:0.03, fontSize:14 },
            
            // ── Borders ──
            { id:'bdr_top', name:'Border Top', color:0x00ffff, w:3.3, h:0.04, x:0, y:1.8, z:0.01 },
            { id:'bdr_bot', name:'Border Bottom', color:0x00ffff, w:3.3, h:0.04, x:0, y:-1.8, z:0.01 },
            { id:'bdr_left', name:'Border Left', color:0x00ffff, w:0.04, h:3.6, x:-1.65, y:0, z:0.01 },
            { id:'bdr_right', name:'Border Right', color:0x00ffff, w:0.04, h:3.6, x:1.65, y:0, z:0.01 },
        ];
        
        const els = {};
        const initPos = {};
        const initScale = {};
        const labels = [];
        
        function makeLabel(text, hex, parent) {
            if (!text) return;
            const c = document.createElement('canvas');
            const ctx = c.getContext('2d');
            c.width = 512; c.height = 64;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            const rr = 4;
            ctx.beginPath();
            ctx.roundRect(0, 0, c.width, c.height, rr);
            ctx.fill();
            const hexStr = '#' + hex.toString(16).padStart(6, '0');
            ctx.fillStyle = hexStr;
            const fs = parent.userData?.def?.fontSize || 10;
            ctx.font = `bold ${fs * 3}px sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, c.width/2, c.height/2);
            const tex = new THREE.CanvasTexture(c);
            const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
            const sp = new THREE.Sprite(mat);
            const aspect = c.width / c.height;
            const labelH = 0.12;
            sp.scale.set(labelH * aspect, labelH, 1);
            sp.renderOrder = 9999; sp.frustumCulled = false;
            sp.userData._parent = parent;
            sp.userData._offY = (parent.userData?.def?.h || 0.1) / 2 + 0.08;
            scene.add(sp);
            return sp;
        }
        
        defs.forEach(d => {
            const geo = new THREE.PlaneGeometry(d.w, d.h);
            const mat = new THREE.MeshBasicMaterial({
                color: d.color, side: THREE.DoubleSide,
                transparent: true,
                opacity: d.id === 'panel' ? 0.92 : (d.id.startsWith('bdr_') ? 0.8 : 0.78)
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(d.x, d.y, d.z);
            mesh.userData = { id: d.id, name: d.name, def: d, origColor: d.color };
            mesh.frustumCulled = false;
            scene.add(mesh);
            els[d.id] = mesh;
            initPos[d.id] = { x: d.x, y: d.y, z: d.z };
            initScale[d.id] = { w: d.w, h: d.h };
            const label = makeLabel(d.name, d.id === 'panel' ? 0x444466 : d.color, mesh);
            if (label) labels.push(label);
        });
        
        let sel = null;
        const HIGHLIGHT = 0x00ffff;
        
        canvas.addEventListener('pointerdown', e => {
            if (e.button !== 0) return;
            const r = canvas.getBoundingClientRect();
            const m = new THREE.Vector2(
                ((e.clientX - r.left) / r.width) * 2 - 1,
                -((e.clientY - r.top) / r.height) * 2 + 1
            );
            const rc = new THREE.Raycaster();
            rc.setFromCamera(m, camera);
            const hits = rc.intersectObjects(Object.values(els), false);
            if (hits.length) select(hits[0].object);
        });
        
        function select(mesh) {
            if (sel) sel.material.color.setHex(sel.userData.origColor);
            pushUndo();
            sel = mesh;
            mesh.material.color.setHex(HIGHLIGHT);
            tc.attach(mesh);
            updateUI();
            updateList();
        }
        
        function updateUI() {
            if (!sel) {
                document.getElementById('selected-name').textContent = 'None';
                ['x','y','z','sw','sh'].forEach(k => document.getElementById('input-'+k).value = '');
                return;
            }
            document.getElementById('selected-name').textContent = sel.userData.name;
            document.getElementById('input-x').value = sel.position.x.toFixed(3);
            document.getElementById('input-y').value = sel.position.y.toFixed(3);
            document.getElementById('input-z').value = sel.position.z.toFixed(3);
            // Scale: read from geometry
            const geo = sel.geometry;
            const params = geo.parameters;
            document.getElementById('input-sw').value = params.width.toFixed(3);
            document.getElementById('input-sh').value = params.height.toFixed(3);
        }
        
        window.updateFromInput = function() {
            if (!sel) return;
            pushUndo();
            sel.position.x = parseFloat(document.getElementById('input-x').value) || 0;
            sel.position.y = parseFloat(document.getElementById('input-y').value) || 0;
            sel.position.z = parseFloat(document.getElementById('input-z').value) || 0;
            const newW = parseFloat(document.getElementById('input-sw').value) || 0.1;
            const newH = parseFloat(document.getElementById('input-sh').value) || 0.1;
            // Replace geometry
            sel.geometry.dispose();
            sel.geometry = new THREE.PlaneGeometry(newW, newH);
            updateList();
        };
        
        function updateList() {
            const c = document.getElementById('elements-container');
            c.innerHTML = '';
            defs.forEach(d => {
                const m = els[d.id];
                const p = m.position;
                const div = document.createElement('div');
                div.className = 'element-item' + (sel === m ? ' selected' : '');
                div.innerHTML = `<span class="name"><span class="color-swatch" style="background:#${d.color.toString(16).padStart(6,'0')}"></span>${d.name}</span><span class="pos">(${p.x.toFixed(1)},${p.y.toFixed(1)})</span>`;
                div.onclick = () => select(m);
                c.appendChild(div);
            });
        }
        
        // ── Undo ──
        const undos = [];
        const MAX_UNDO = 20;
        function snap() {
            const s = {};
            Object.keys(els).forEach(id => {
                const m = els[id];
                s[id] = { x:m.position.x, y:m.position.y, z:m.position.z, w:m.geometry.parameters.width, h:m.geometry.parameters.height };
            });
            return s;
        }
        function pushUndo() { undos.push(snap()); if (undos.length > MAX_UNDO) undos.shift(); }
        window.undo = function() {
            if (!undos.length) return;
            const s = undos.pop();
            Object.keys(s).forEach(id => {
                if (!els[id]) return;
                els[id].position.set(s[id].x, s[id].y, s[id].z);
                els[id].geometry.dispose();
                els[id].geometry = new THREE.PlaneGeometry(s[id].w, s[id].h);
            });
            updateUI(); updateList();
        };
        window.resetAll = function() {
            pushUndo();
            Object.keys(els).forEach(id => {
                els[id].position.set(initPos[id].x, initPos[id].y, initPos[id].z);
                els[id].geometry.dispose();
                els[id].geometry = new THREE.PlaneGeometry(initScale[id].w, initScale[id].h);
            });
            updateUI(); updateList();
        };
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); window.undo(); }
        });
        tc.addEventListener('mouseDown', () => pushUndo());
        tc.addEventListener('objectChange', () => { updateUI(); updateList(); });
        
        // ── Export / Import ──
        window.exportJSON = function() {
            const data = { editor:'pause-menu', elements:{}, exportedAt: new Date().toISOString() };
            Object.keys(els).forEach(id => {
                const m = els[id];
                data.elements[id] = {
                    x:+m.position.x.toFixed(3), y:+m.position.y.toFixed(3), z:+m.position.z.toFixed(3),
                    w:+m.geometry.parameters.width.toFixed(3), h:+m.geometry.parameters.height.toFixed(3)
                };
            });
            const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'pause-menu-layout.json'; a.click();
        };
        window.importJSON = function(ev) {
            const f = ev.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => {
                try {
                    const d = JSON.parse(e.target.result);
                    if(d.elements) {
                        pushUndo();
                        Object.keys(d.elements).forEach(id => {
                            if(!els[id]) return;
                            const p = d.elements[id];
                            els[id].position.set(p.x, p.y, p.z);
                            if(p.w && p.h) {
                                els[id].geometry.dispose();
                                els[id].geometry = new THREE.PlaneGeometry(p.w, p.h);
                            }
                        });
                        updateUI(); updateList();
                    }
                } catch(err) { alert('Invalid JSON'); }
            };
            r.readAsText(f); ev.target.value='';
        };
        
        // ── Resize / Animate ──
        function resize() {
            const c = document.getElementById('viewport');
            camera.aspect = c.clientWidth / c.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(c.clientWidth, c.clientHeight);
        }
        window.addEventListener('resize', resize); resize();
        
        (function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            labels.forEach(l => {
                const p = l.userData._parent;
                if (p) { p.getWorldPosition(l.position); l.position.y += l.userData._offY; }
            });
            renderer.render(scene, camera);
        })();
        updateList();
    </script>
</body>
</html>
